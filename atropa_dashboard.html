<meta charset="utf-8">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
  body { background: radial-gradient(circle at center, #11141a 0%, #08090d 100%); color: #f0f2f5; overflow: hidden; height: 100vh; display: flex; }
  #sidebar { width: 380px; background: rgba(13, 16, 22, 0.9); backdrop-filter: blur(16px); border-right: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; padding: 24px; z-index: 10; overflow-y: auto; }
  #network-container { flex: 1; height: 100%; position: relative; }
  canvas { width: 100%; height: 100%; display: block; background: transparent; cursor: grab; }
  canvas:active { cursor: grabbing; }
  h1 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .sub { font-size: 13px; color: #8a92a6; margin-bottom: 24px; }
  .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .card-title { font-size: 11px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
  .info-val { font-size: 15px; font-weight: 500; word-break: break-all; color: #e2e8f0; }
  .details-box { display: none; }
  #search-box { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; color: #fff; margin-bottom: 16px; font-size: 14px; outline: none; }
  #search-box:focus { border-color: #00f2fe; }
  .pool-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .view-btn { width: 100%; text-align: left; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 8px 12px; color: #8a92a6; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; font-size: 13px; outline: none; }
  .view-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .view-btn.active { background: linear-gradient(135deg, rgba(0,242,254,0.1) 0%, rgba(79,172,254,0.1) 100%); border-color: #00f2fe; color: #00f2fe; }
</style>
</head>

      <div class="card-title" style="margin-top:12px;">Address</div>

    </div>
    <div class="card">
      <div class="card-title">LP Connections</div>
      <div id="det-pools"></div>
    </div>
  </div>
</div>

        n.targetY = Math.sin(angle) * radius;
      } else if (mode === 'tune') {
        n.targetX = -350 + (idx / nodes.length) * 700;
        n.targetY = -150 + (idx % 4) * 100;
      } else if (mode === 'conify') {
        let cols = 8;
        let col = idx % cols;
        let row = Math.floor(idx / cols);
        n.targetX = -320 + col * 90;
        n.targetY = -250 + row * 70;
      } else if (mode === 'bond') {
        let angle = (idx / nodes.length) * 2 * Math.PI;
        n.targetX = Math.cos(angle) * 280;
        n.targetY = Math.sin(2 * angle) * 180;
      } else if (mode === 'delegate') {
        let angle = (idx / nodes.length) * 4 * Math.PI;
        let R = 220, r = 70, d = 110;
        n.targetX = (R - r) * Math.cos(angle) + d * Math.cos(((R - r) / r) * angle);
        n.targetY = (R - r) * Math.sin(angle) - d * Math.sin(((R - r) / r) * angle);
      }
    });
  }

  function updateSimulation() {
    if (viewMode === 'force') {
      // Repulsion between all nodes
      for (let i = 0; i < nodes.length; i++) {
        let n1 = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          let n2 = nodes[j];
          let dx = n2.x - n1.x;
          let dy = n2.y - n1.y;
          let dist = Math.sqrt(dx*dx + dy*dy) || 1;
          if (dist < 350) {
            let force = (350 - dist) * 0.12;
            let fx = (dx / dist) * force;
            let fy = (dy / dist) * force;
            if (n1 !== draggedNode) { n1.vx -= fx; n1.vy -= fy; }
            if (n2 !== draggedNode) { n2.vx += fx; n2.vy += fy; }
          }
        }
      }

      // Attraction along links
      links.forEach(l => {
        let dx = l.target.x - l.source.x;
        let dy = l.target.y - l.source.y;
        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
        let desired = 100;
        if (dist > desired) {
          let force = (dist - desired) * 0.04;
          let fx = (dx / dist) * force;
          let fy = (dy / dist) * force;
          if (l.source !== draggedNode) { l.source.vx += fx; l.source.vy += fy; }
          if (l.target !== draggedNode) { l.target.vx -= fx; l.target.vy -= fy; }
        }
      });

      // Gravity towards center and updates
      nodes.forEach(n => {
        if (n !== draggedNode) {
          n.vx -= n.x * 0.015;
          n.vy -= n.y * 0.015;
          n.x += n.vx;
          n.y += n.vy;
          n.vx *= 0.75;
          n.vy *= 0.75;
        }
      });
    } else {
      // Interpolation to target coordinates
      nodes.forEach(n => {
        if (n !== draggedNode) {
          n.x += (n.targetX - n.x) * 0.12;
          n.y += (n.targetY - n.y) * 0.12;
          n.vx = 0; n.vy = 0;
        }
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, width, height);
    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.scale, transform.scale);

    // Draw connections
    links.forEach(l => {
      ctx.beginPath();
      ctx.moveTo(l.source.x, l.source.y);
      ctx.lineTo(l.target.x, l.target.y);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.07)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    // Draw nodes
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
      const isSel = n === selectedNode;
      ctx.fillStyle = n.color;
      ctx.shadowBlur = isSel ? 20 : 8;
      ctx.shadowColor = n.color;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Label
      ctx.fillStyle = '#ffffff';
      ctx.font = isSel ? 'bold 12px Outfit' : '10px Outfit';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y - n.radius - 6);
    });

    ctx.restore();
  }

  function loop() {
    updateSimulation();
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left - transform.x) / transform.scale,
      y: (e.clientY - rect.top - transform.y) / transform.scale
    };
  }

  canvas.addEventListener('mousedown', e => {
    const m = getMousePos(e);
    let clickedNode = null;
    for (let i = nodes.length - 1; i >= 0; i--) {
      let n = nodes[i];
      let dist = Math.sqrt((n.x - m.x)**2 + (n.y - m.y)**2);
      if (dist < n.radius + 6) {
        clickedNode = n;
        break;
      }
    }

    if (clickedNode) {
      selectedNode = clickedNode;
      draggedNode = clickedNode;
      displayDetails(clickedNode);
    } else {
      isPanning = true;
      panStart.x = e.clientX - transform.x;
      panStart.y = e.clientY - transform.y;
    }
  });

  canvas.addEventListener('mousemove', e => {
    if (draggedNode) {
      const m = getMousePos(e);
      draggedNode.x = m.x;
      draggedNode.y = m.y;
      draggedNode.vx = 0;
      draggedNode.vy = 0;
    } else if (isPanning) {
      transform.x = e.clientX - panStart.x;
      transform.y = e.clientY - panStart.y;
    }
  });

  window.addEventListener('mouseup', () => {
    draggedNode = null;
    isPanning = false;
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const zoom = e.deltaY < 0 ? 1.1 : 0.9;
    transform.scale = Math.min(Math.max(transform.scale * zoom, 0.1), 5);
  });

  function displayDetails(node) {
    document.getElementById('details').style.display = 'block';
    document.getElementById('det-name').innerText = node.name || 'Unknown';
    document.getElementById('det-sym').innerText = node.symbol || 'UNKNOWN';
    document.getElementById('det-addr').innerText = node.id;

    let poolsHtml = '';
    links.forEach(l => {
      if (l.source.id.toLowerCase() === node.id.toLowerCase()) {
        poolsHtml += '<div class="pool-row"><span>' + l.target.symbol + '</span><strong>' + l.price.toFixed(6) + '</strong></div>';
      } else if (l.target.id.toLowerCase() === node.id.toLowerCase()) {
        poolsHtml += '<div class="pool-row"><span>' + l.source.symbol + '</span><strong>' + (1/l.price).toFixed(6) + '</strong></div>';
      }
    });
    document.getElementById('det-pools').innerHTML = poolsHtml || '<div style="color:#64748b;font-size:13px;">No direct active LPs found</div>';
  }

  function searchNode() {
    const val = document.getElementById('search-box').value.toLowerCase().trim();
    if (val.length === 0) return;
    const matched = nodes.find(n => n.id.toLowerCase() === val || n.name.toLowerCase().includes(val) || n.symbol.toLowerCase().includes(val) || (n.varName && n.varName.toLowerCase().includes(val)));
    if (matched) {
      selectedNode = matched;
      displayDetails(matched);
      transform.x = width / 2 - matched.x * transform.scale;
      transform.y = height / 2 - matched.y * transform.scale;
    }
  }
</script>
</body>
</html>
