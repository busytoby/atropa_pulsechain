<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binaural React Sequencer - Teddy Bear Court of Law</title>
    <style>
        :root {
            --bg-color: #050303;
            --panel-bg: rgba(12, 6, 6, 0.85);
            --primary-glow: #ef4444;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(239, 68, 68, 0.15);
            --accent-purple: #6d28d9;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
        }

        .synth-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .widget-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        .widget-card h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #oscilloscope {
            width: 100%;
            height: 240px;
            background: #000000;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        /* Sequencer Matrix styling */
        .sequencer-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .seq-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .seq-label {
            width: 110px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-family: monospace;
            color: var(--text-muted);
        }

        .seq-steps {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 4px;
            flex-grow: 1;
        }

        .seq-step {
            height: 28px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .seq-step.active {
            background: var(--primary-glow);
            border-color: var(--primary-glow);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .seq-step.playhead {
            border-color: #ffffff;
            box-shadow: 0 0 8px #ffffff;
        }

        /* Audio Controls */
        .audio-status-banner {
            padding: 10px 15px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--primary-glow);
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .transport-bar {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .control-btn {
            background: var(--primary-glow);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .control-btn:hover {
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }

        .stat-card label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .stat-value {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--primary-glow);
        }
    </style>
</head>
<body>

    <header>
        <h1>Binaural React Sequencer</h1>
        <div id="audio-btn" class="audio-status-banner">TAP TO ACTIVATE AUDIOPATHWAY</div>
    </header>

    <div class="main-container">
        <div class="synth-panel">
            <div class="transport-bar">
                <button id="btn-play" class="control-btn" style="background:#10b981;">Play</button>
                <div style="display:flex; align-items:center; gap:8px;">
                    <label style="font-size:0.75rem; text-transform:uppercase; color:var(--text-muted);">Tempo</label>
                    <input type="range" id="seq-tempo" min="60" max="150" value="80" style="width:120px;">
                    <span id="tempo-val" style="font-family:monospace; font-size:0.8rem;">80 BPM</span>
                </div>
            </div>

            <div>
                <canvas id="oscilloscope"></canvas>
            </div>

            <!-- Sequencer Matrix -->
            <div class="sequencer-grid">
                <div class="seq-row" data-voice="0">
                    <div class="seq-label">Judge Bear</div>
                    <div class="seq-steps"></div>
                </div>
                <div class="seq-row" data-voice="1">
                    <div class="seq-label">Witness A</div>
                    <div class="seq-steps"></div>
                </div>
                <div class="seq-row" data-voice="2">
                    <div class="seq-label">Witness B</div>
                    <div class="seq-steps"></div>
                </div>
                <div class="seq-row" data-voice="3">
                    <div class="seq-label">Juror 1</div>
                    <div class="seq-steps"></div>
                </div>
                <div class="seq-row" data-voice="4">
                    <div class="seq-label">Juror 2</div>
                    <div class="seq-steps"></div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="widget-card">
                <h3>Agreement Accumulator</h3>
                <div class="control-group" style="text-align:center;">
                    <div id="agreement-val" style="font-size:2rem; font-family:monospace; color:var(--primary-glow); text-shadow:0 0 10px rgba(239,68,68,0.5);">0.9481</div>
                    <div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; margin-top:4px;">Five-Voice Similitude Status</div>
                </div>
            </div>

            <div class="widget-card">
                <h3>Live Register Telemetry</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <label>Active Voice</label>
                        <div class="stat-value" id="active-voice-name">None</div>
                    </div>
                    <div class="stat-card">
                        <label>State Superposition</label>
                        <div class="stat-value" id="wave-psi">0.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MotzkinPrime = 953467954114363n;

        // 5 Voice settings
        const VOICES = [
            {"name": "Judge Bear", "address": "0xAD4e198623A5E2723e19E4D4a6ECF72B1D19FE4B", "exp": 440n, "color": "#ef4444", "pan": 0.0},
            {"name": "Witness A", "address": "0xD07B9f3DF4E9634EbAa0CBF079816925b2C474Ce", "exp": 12000n, "color": "#d97706", "pan": -0.6},
            {"name": "Witness B", "address": "0xd32c39fee49391c7952d1b30b15921b0d3b42e69", "exp": 8877n, "color": "#3b82f6", "pan": 0.6},
            {"name": "Juror 1", "address": "0xed343c0f99c89ed7c3c934a88f90261fd6a9a68b", "exp": 4433n, "color": "#10b981", "pan": -0.8},
            {"name": "Juror 2", "address": "0x3e10ed242ecb3951151e7a07e0a8f43d4f150c0e", "exp": 5522n, "color": "#8b5cf6", "pan": 0.8}
        ];

        // Web Audio Context
        let audioCtx = null;
        let playhead = 0;
        let isPlaying = false;
        let seqInterval = null;

        const btnPlay = document.getElementById("btn-play");
        const tempoSlider = document.getElementById("seq-tempo");
        const tempoVal = document.getElementById("tempo-val");
        const audioBtn = document.getElementById("audio-btn");
        const activeVoiceName = document.getElementById("active-voice-name");
        const wavePsi = document.getElementById("wave-psi");

        // Build sequencer steps dynamically
        document.querySelectorAll(".seq-row").forEach(row => {
            const stepsDiv = row.querySelector(".seq-steps");
            const voiceIdx = parseInt(row.getAttribute("data-voice"));
            for (let i = 0; i < 16; i++) {
                const step = document.createElement("div");
                step.className = "seq-step";
                // Preset some initial notes for a rhythmic court-of-law structure
                if ((voiceIdx === 0 && i % 4 === 0) || (voiceIdx === 1 && i % 4 === 1) || (voiceIdx === 2 && i % 4 === 2)) {
                    step.classList.add("active");
                }
                step.onclick = () => step.classList.toggle("active");
                stepsDiv.appendChild(step);
            }
        });

        tempoSlider.oninput = () => {
            tempoVal.innerText = tempoSlider.value + " BPM";
            if (isPlaying) {
                stopSequencer();
                startSequencer();
            }
        };

        function bigModExp(base, exp, mod) {
            let res = 1n;
            base = BigInt(base) % BigInt(mod);
            exp = BigInt(exp);
            const m = BigInt(mod);
            while (exp > 0n) {
                if (exp % 2n === 1n) res = (res * base) % m;
                base = (base * base) % m;
                exp = exp / 2n;
            }
            return res;
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioBtn.innerText = "AUDIOPATHWAY ACTIVE";
            audioBtn.style.background = "rgba(16, 185, 129, 0.1)";
            audioBtn.style.color = "#10b981";
        }

        function playStepSound(voiceIdx, time) {
            if (!audioCtx) return;
            const v = VOICES[voiceIdx];
            
            // Derive frequencies using BigInt Yul equations
            const Pi = BigInt(Math.floor(220 + voiceIdx * 80)); // base pitch
            const Eta = bigModExp(Pi, v.exp, MotzkinPrime);
            const Kappa = bigModExp(Pi, MotzkinPrime, v.exp);
            
            const freqL = Number((Eta % 400n) + 150n);
            const freqR = Number((Kappa % 400n) + 150n);

            // Construct synthesis graph
            const mainGain = audioCtx.createGain();
            mainGain.gain.setValueAtTime(0.0, time);
            mainGain.gain.linearRampToValueAtTime(0.2, time + 0.02);
            mainGain.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
            mainGain.connect(audioCtx.destination);

            const panner = audioCtx.createStereoPanner();
            panner.pan.setValueAtTime(v.pan, time);
            panner.connect(mainGain);

            const oscL = audioCtx.createOscillator();
            oscL.type = "sine";
            oscL.frequency.setValueAtTime(freqL, time);
            oscL.connect(panner);

            const oscR = audioCtx.createOscillator();
            oscR.type = "sawtooth"; // Rich harmonic substrate
            oscR.frequency.setValueAtTime(freqR, time);
            oscR.connect(panner);

            oscL.start(time);
            oscR.start(time);
            oscL.stop(time + 0.4);
            oscR.stop(time + 0.4);

            // Telemetry update
            activeVoiceName.innerText = v.name;
            activeVoiceName.style.color = v.color;
            wavePsi.innerText = (Number(Eta % 1000n) / 1000.0).toFixed(4);
        }

        function startSequencer() {
            isPlaying = true;
            btnPlay.innerText = "Stop";
            btnPlay.style.background = "#ef4444";

            const stepDuration = 60.0 / parseInt(tempoSlider.value) / 4.0; // 16th notes
            let nextStepTime = audioCtx.currentTime;

            seqInterval = setInterval(() => {
                if (audioCtx.currentTime >= nextStepTime - 0.05) {
                    // Update visual playhead
                    document.querySelectorAll(".seq-row").forEach((row, voiceIdx) => {
                        const steps = row.querySelectorAll(".seq-step");
                        steps.forEach((s, idx) => {
                            if (idx === playhead) {
                                s.classList.add("playhead");
                                if (s.classList.contains("active")) {
                                    playStepSound(voiceIdx, nextStepTime);
                                }
                            } else {
                                s.classList.remove("playhead");
                            }
                        });
                    });

                    playhead = (playhead + 1) % 16;
                    nextStepTime += stepDuration;
                }
            }, 25);
        }

        function stopSequencer() {
            isPlaying = false;
            btnPlay.innerText = "Play";
            btnPlay.style.background = "#10b981";
            clearInterval(seqInterval);
            document.querySelectorAll(".seq-step").forEach(s => s.classList.remove("playhead"));
        }

        btnPlay.onclick = () => {
            initAudio();
            if (audioCtx.state === "suspended") audioCtx.resume();
            if (isPlaying) {
                stopSequencer();
            } else {
                startSequencer();
            }
        };

        audioBtn.onclick = () => {
            initAudio();
        };

        // Canvas rosettes visualization
        const canvas = document.getElementById("oscilloscope");
        const ctx = canvas.getContext("2d");
        canvas.width = canvas.offsetWidth;
        canvas.height = 240;

        let rotVal = 0;
        function drawVisuals() {
            ctx.fillStyle = "#050303";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw spinning clockwork gears
            ctx.strokeStyle = "rgba(239, 68, 68, 0.08)";
            ctx.lineWidth = 1;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            for (let angle = 0; angle < 360; angle += 45) {
                const rad = (angle * Math.PI) / 180 + rotVal;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + Math.cos(rad) * 80, cy + Math.sin(rad) * 80);
                ctx.stroke();
            }

            // Draw active rosettes
            ctx.strokeStyle = "var(--primary-glow)";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 8;
            ctx.shadowColor = "var(--primary-glow)";
            ctx.beginPath();

            const R = 48, r = 24, d = 15;
            let first = true;
            for (let theta = 0; theta < 4 * Math.PI; theta += 0.08) {
                const x = cx + ((R - r) * Math.cos(theta + rotVal) + d * Math.cos(((R - r)/r)*theta));
                const y = cy + ((R - r) * Math.sin(theta + rotVal) - d * Math.sin(((R - r)/r)*theta));
                if (first) {
                    ctx.moveTo(x, y);
                    first = false;
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
            ctx.shadowBlur = 0;

            rotVal += 0.015;
            requestAnimationFrame(drawVisuals);
        }

        drawVisuals();
    </script>
</body>
</html>
