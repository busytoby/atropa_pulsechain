<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Binaural Synthesizer Lead</title>
    <style>
        :root {
            --bg-color: #030508;
            --panel-bg: rgba(10, 15, 26, 0.7);
            --primary-glow: #fbbf24;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(251, 191, 36, 0.15);
            --npn-color: #f59e0b;
            --pnp-color: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
        }

        .synth-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .widget-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .widget-card h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1rem;
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-glow);
            background: rgba(255,255,255,0.05);
            height: 6px;
            border-radius: 3px;
            outline: none;
            border: none;
        }

        .slider-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-family: monospace;
        }

        /* Keyboard styling */
        .keys-container {
            display: flex;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .key {
            width: 40px;
            height: 150px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            margin: 0 2px;
            position: relative;
            z-index: 1;
            transition: background 0.1s ease;
        }

        .key.black {
            width: 26px;
            height: 90px;
            background: #111827;
            border: 1px solid #000;
            margin-left: -15px;
            margin-right: -15px;
            z-index: 2;
        }

        .key:active, .key.active {
            background: var(--primary-glow) !important;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .key.black:active, .key.black.active {
            background: #d97706 !important;
        }

        /* Oscilloscope */
        #oscilloscope {
            width: 100%;
            height: 200px;
            background: #05070a;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Audio Controls */
        .audio-status-banner {
            padding: 10px 15px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--primary-glow);
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .audio-status-banner:hover {
            background: rgba(245, 158, 11, 0.15);
        }

        /* stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }

        .stat-card label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .stat-value {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--primary-glow);
        }

    </style>
</head>
<body>

    <header>
        <h1>Reaction Binaural Synthesizer</h1>
        <div id="audio-btn" class="audio-status-banner">TAP TO ACTIVATE AUDIOPATHWAY</div>
    </header>

    <div class="main-container">
        <div class="synth-panel">
            <div>
                <h3 style="margin-top: 0; color: var(--primary-glow);">Binaural Phase Vectors</h3>
                <canvas id="oscilloscope"></canvas>
            </div>

            <!-- Keys keyboard -->
            <div class="keys-container">
                <div class="key" data-note="C4"></div>
                <div class="key black" data-note="C#4"></div>
                <div class="key" data-note="D4"></div>
                <div class="key black" data-note="D#4"></div>
                <div class="key" data-note="E4"></div>
                <div class="key" data-note="F4"></div>
                <div class="key black" data-note="F#4"></div>
                <div class="key" data-note="G4"></div>
                <div class="key black" data-note="G#4"></div>
                <div class="key" data-note="A4"></div>
                <div class="key black" data-note="A#4"></div>
                <div class="key" data-note="B4"></div>
                <div class="key" data-note="C5"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="widget-card">
                <h3>Reaction FUSE Constants</h3>
                
                <div class="control-group">
                    <label>MotzkinPrime</label>
                    <div class="stat-value">953467954114363</div>
                </div>

                <div class="control-group">
                    <label>Base Input Offset (Base)</label>
                    <input type="range" id="fuse-base" min="1000" max="50000" value="12000">
                    <div class="slider-meta">
                        <span>Narrow</span>
                        <span id="base-val">12000</span>
                        <span>Wide</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Modulation Channel (Channel)</label>
                    <input type="range" id="fuse-channel" min="10" max="1000" value="440">
                    <div class="slider-meta">
                        <span>Low</span>
                        <span id="channel-val">440 Hz</span>
                        <span>High</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Tonewheel Pre-Mangler</label>
                    <button id="btn-mangle" class="control-btn" style="background:#ef4444; border:none; padding:10px; width:100%; border-radius:6px; color:#fff; cursor:pointer; font-weight:bold; margin-top:5px;">Mangle: OFF</button>
                </div>
            </div>

            <div class="widget-card">
                <h3>Live Register Telemetry</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <label>Left (Eta)</label>
                        <div class="stat-value" id="reg-eta">0</div>
                    </div>
                    <div class="stat-card">
                        <label>Right (Kappa)</label>
                        <div class="stat-value" id="reg-kappa">0</div>
                    </div>
                    <div class="stat-card">
                        <label>Left Freq</label>
                        <div class="stat-value" id="freq-l">0.0 Hz</div>
                    </div>
                    <div class="stat-card">
                        <label>Right Freq</label>
                        <div class="stat-value" id="freq-r">0.0 Hz</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MotzkinPrime = 953467954114363n;

        // Web Audio API Context
        let audioCtx = null;
        let leftOsc = null;
        let rightOsc = null;
        let leftGain = null;
        let rightGain = null;
        let mainGain = null;

        const baseSlider = document.getElementById("fuse-base");
        const baseVal = document.getElementById("base-val");
        const channelSlider = document.getElementById("fuse-channel");
        const channelVal = document.getElementById("channel-val");

        const regEta = document.getElementById("reg-eta");
        const regKappa = document.getElementById("reg-kappa");
        const freqL = document.getElementById("freq-l");
        const freqR = document.getElementById("freq-r");

        const audioBtn = document.getElementById("audio-btn");
        const btnMangle = document.getElementById("btn-mangle");
        
        let mangleEnabled = false;
        btnMangle.onclick = () => {
            mangleEnabled = !mangleEnabled;
            if (mangleEnabled) {
                btnMangle.innerText = "Mangle: ON";
                btnMangle.style.background = "#fbbf24";
                btnMangle.style.color = "#030508";
            } else {
                btnMangle.innerText = "Mangle: OFF";
                btnMangle.style.background = "#ef4444";
                btnMangle.style.color = "#fff";
            }
        };

        // Note frequencies mapping
        const notes = {
            "C4": 261.63, "C#4": 277.18, "D4": 293.66, "D#4": 311.13, "E4": 329.63,
            "F4": 349.23, "F#4": 369.99, "G4": 392.00, "G#4": 415.30, "A4": 440.00,
            "A#4": 466.16, "B4": 493.88, "C5": 523.25
        };

        function bigModExp(base, exp, mod) {
            let res = 1n;
            base = BigInt(base) % BigInt(mod);
            exp = BigInt(exp);
            const m = BigInt(mod);
            while (exp > 0n) {
                if (exp % 2n === 1n) res = (res * base) % m;
                base = (base * base) % m;
                exp = exp / 2n;
            }
            return res;
        }

        // Initialize Audio Node graph
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Destination Gain
            mainGain = audioCtx.createGain();
            mainGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            mainGain.connect(audioCtx.destination);

            // Left Channel
            const leftPanner = audioCtx.createStereoPanner();
            leftPanner.pan.setValueAtTime(-1, audioCtx.currentTime);
            leftPanner.connect(mainGain);

            leftGain = audioCtx.createGain();
            leftGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
            leftGain.connect(leftPanner);

            leftOsc = audioCtx.createOscillator();
            leftOsc.type = "sine";
            leftOsc.frequency.setValueAtTime(440, audioCtx.currentTime);
            leftOsc.connect(leftGain);
            leftOsc.start();

            // Right Channel
            const rightPanner = audioCtx.createStereoPanner();
            rightPanner.pan.setValueAtTime(1, audioCtx.currentTime);
            rightPanner.connect(mainGain);

            rightGain = audioCtx.createGain();
            rightGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
            rightGain.connect(rightPanner);

            rightOsc = audioCtx.createOscillator();
            rightOsc.type = "sine";
            rightOsc.frequency.setValueAtTime(440, audioCtx.currentTime);
            rightOsc.connect(rightGain);
            rightOsc.start();

            audioBtn.innerText = "AUDIOPATHWAY ACTIVE";
            audioBtn.style.background = "rgba(16, 185, 129, 0.1)";
            audioBtn.style.borderColor = "rgba(16, 185, 129, 0.2)";
            audioBtn.style.color = "var(--pnp-color)";
        }

        audioBtn.addEventListener("click", () => {
            initAudio();
            if (audioCtx && audioCtx.state === "suspended") {
                audioCtx.resume();
            }
        });

        // Reaction implementation
        function triggerReactionNote(noteName) {
            initAudio();
            const f = notes[noteName];
            let Pi = BigInt(Math.floor(f));
            
            if (mangleEnabled) {
                // Pre-circuit note mangling using time-dependent factor
                const factor = BigInt(Math.floor(Math.sin(Date.now() / 200.0) * 4.0 + 5.0));
                Pi = (Pi * factor) % MotzkinPrime;
            }
            
            const baseParam = BigInt(baseSlider.value);
            const channelParam = BigInt(channelSlider.value);

            // React equations
            const Eta = bigModExp(Pi, channelParam, baseParam);
            const Kappa = bigModExp(Pi, baseParam, channelParam);

            // Map results to audible frequencies (keep within comfortable synth range: 100 - 900 Hz)
            const targetLeftFreq = Number((Eta % 800n) + 100n);
            const targetRightFreq = Number((Kappa % 800n) + 100n);

            // Telemetry values update
            regEta.innerText = "0x" + Eta.toString(16).toUpperCase();
            regKappa.innerText = "0x" + Kappa.toString(16).toUpperCase();
            freqL.innerText = targetLeftFreq.toFixed(1) + " Hz";
            freqR.innerText = targetRightFreq.toFixed(1) + " Hz";

            // Audio ramp
            if (audioCtx) {
                leftOsc.frequency.setTargetAtTime(targetLeftFreq, audioCtx.currentTime, 0.05);
                rightOsc.frequency.setTargetAtTime(targetRightFreq, audioCtx.currentTime, 0.05);
                leftGain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.03);
                rightGain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.03);
            }
        }

        function releaseReactionNote() {
            if (audioCtx) {
                leftGain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.15);
                rightGain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.15);
            }
        }

        // Setup sliders
        baseSlider.addEventListener("input", () => {
            baseVal.innerText = baseSlider.value;
        });

        channelSlider.addEventListener("input", () => {
            channelVal.innerText = channelSlider.value + " Hz";
        });

        // Setup keyboard handlers
        document.querySelectorAll(".key").forEach(key => {
            const note = key.getAttribute("data-note");
            key.addEventListener("mousedown", () => {
                key.classList.add("active");
                triggerReactionNote(note);
            });
            key.addEventListener("mouseup", () => {
                key.classList.remove("active");
                releaseReactionNote();
            });
            key.addEventListener("mouseleave", () => {
                key.classList.remove("active");
                releaseReactionNote();
            });
        });

        // Visualization
        const canvas = document.getElementById("oscilloscope");
        const ctx = canvas.getContext("2d");
        canvas.width = canvas.offsetWidth;
        canvas.height = 200;

        let timeOffset = 0;
        function drawVisualization() {
            ctx.fillStyle = "#05070a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center axes
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            // Lissajous projection derived from left and right frequencies
            ctx.strokeStyle = "var(--primary-glow)";
            ctx.shadowColor = "var(--primary-glow)";
            ctx.shadowBlur = 8;
            ctx.lineWidth = 2;
            ctx.beginPath();

            const leftF = leftOsc ? leftOsc.frequency.value : 440;
            const rightF = rightOsc ? rightOsc.frequency.value : 440;

            const scaleX = canvas.width * 0.4;
            const scaleY = canvas.height * 0.45;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            for (let i = 0; i <= 200; i++) {
                const t = (i / 200) * 2.0 * Math.PI;
                const x = centerX + Math.sin(t * (leftF / 100) + timeOffset) * scaleX;
                const y = centerY + Math.cos(t * (rightF / 100)) * scaleY;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;

            timeOffset += 0.02;
            requestAnimationFrame(drawVisualization);
        }

        drawVisualization();
    </script>
</body>
</html>
