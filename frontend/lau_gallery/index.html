<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auncient LAU Signatures Gallery</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #00f0ff;
            --accent-secondary: #ff007f;
            --gold-accent: #d4af37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: 
                radial-gradient(at 10% 20%, rgba(0, 240, 255, 0.03) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(255, 0, 127, 0.03) 0px, transparent 50%);
        }

        header {
            padding: 2.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
            background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 0.5rem;
            color: var(--text-primary);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        h1 span {
            color: var(--gold-accent);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        p.subtitle {
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0 0 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 3rem 2rem;
            max-width: 1650px;
            margin: 0 auto;
        }

        .lau-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(16px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .lau-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 240, 255, 0.1);
        }

        .image-container {
            display: block;
            border-bottom: 1px solid var(--card-border);
            position: relative;
            background: #060913;
            width: 100%;
        }

        .image-wrapper {
            width: 100%;
            aspect-ratio: 1.618; /* Golden ratio landscape aspect */
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .image-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #fff;
            backdrop-filter: blur(4px);
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-details {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .token-symbol {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
        }

        .minter-badge {
            background: rgba(16, 185, 129, 0.12);
            color: #10b981;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .token-name {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .token-address {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-primary);
            background: rgba(0, 240, 255, 0.04);
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            margin-top: 0.4rem;
            word-break: break-all;
            border: 1px solid rgba(0, 240, 255, 0.1);
        }

        .btn-compile {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 0.5rem;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.6rem;
            width: 100%;
            text-align: center;
            outline: none;
        }

        .btn-compile:hover {
            background: var(--accent-primary);
            color: var(--bg-color);
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .btn-compile.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-secondary);
            grid-column: 1 / -1;
            font-size: 1.2rem;
            font-family: 'Share Tech Mono', monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>Auncient LAU <span>Signatures Gallery</span></h1>
        <p class="subtitle">WinchesterMQ Handshake / Self-Animating Radiotelescope Imagery</p>
        <div class="controls">
            <input type="text" id="search-input" placeholder="Search by Symbol, Name, or Address...">
        </div>
    </header>

    <main class="gallery-grid" id="gallery-grid">
        <!-- Dynamic Cards Loaded via JS -->
    </main>

    <script>
        let allTokens = {};
        let activeCanvases = [];

        // HSL helper matching python script exactly
        function hslToRgb(h, s, l) {
            let c = (1.0 - Math.abs(2.0 * l - 1.0)) * s;
            let x = c * (1.0 - Math.abs((h / 60.0) % 2.0 - 1.0));
            let m = l - c / 2.0;
            let r, g, b;
            if (0 <= h && h < 60) {
                [r, g, b] = [c, x, 0.0];
            } else if (60 <= h && h < 120) {
                [r, g, b] = [x, c, 0.0];
            } else if (120 <= h && h < 180) {
                [r, g, b] = [0.0, c, x];
            } else if (180 <= h && h < 240) {
                [r, g, b] = [0.0, x, c];
            } else if (240 <= h && h < 300) {
                [r, g, b] = [x, 0.0, c];
            } else {
                [r, g, b] = [c, 0.0, x];
            }
            return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
        }

        function getAddressColor(address) {
            let hash = 0;
            for (let i = 0; i < address.length; i++) {
                hash = address.charCodeAt(i) + ((hash << 5) - hash);
            }
            let hue = Math.abs(hash) % 360;
            let rgb = hslToRgb(hue, 0.90, 0.55);
            return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
        }

        function deriveLauRegisters(address) {
            let hash = 0;
            for (let i = 0; i < address.length; i++) {
                hash = address.charCodeAt(i) + ((hash << 5) - hash);
            }
            let val = Math.abs(hash);
            return {
                base: val % 1000000000,
                secret: (val * 31) % 1000000000,
                signal: (val * 37) % 1000000000,
                channel: (val * 41) % 1000000000,
                pole: (val * 43) % 1000000000,
                foundation: (val * 47) % 1000000000,
                element: (val * 53) % 1000000000,
                chin: (val * 59) % 1000000000,
                dynamo: (val * 61) % 1000000000
            };
        }

        async function fetchTokens() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                if (data.treasury_tokens) {
                    allTokens = data.treasury_tokens;
                    renderGallery();
                }
            } catch (err) {
                console.error("Error loading gallery data:", err);
            }
        }

        async function compileDna(address, button) {
            if (button.classList.contains("loading")) return;
            button.classList.add("loading");
            button.innerText = "COMPILING...";
            try {
                const response = await fetch(`/api/compile-dna?address=${address}`);
                const data = await response.json();
                if (data.success) {
                    button.innerText = "GENOME COMPILED!";
                    button.style.borderColor = "var(--gold-accent)";
                    button.style.color = "var(--gold-accent)";
                    setTimeout(() => {
                        button.innerText = "COMPILE GENOME DNA";
                        button.style.borderColor = "";
                        button.style.color = "";
                        button.classList.remove("loading");
                    }, 3000);
                } else {
                    button.innerText = "ERROR COMPILING";
                    button.style.borderColor = "var(--accent-secondary)";
                    button.style.color = "var(--accent-secondary)";
                    setTimeout(() => {
                        button.innerText = "COMPILE GENOME DNA";
                        button.style.borderColor = "";
                        button.style.color = "";
                        button.classList.remove("loading");
                    }, 3000);
                }
            } catch (err) {
                console.error("Failed to compile DNA:", err);
                button.innerText = "OFFLINE";
                setTimeout(() => {
                    button.innerText = "COMPILE GENOME DNA";
                    button.classList.remove("loading");
                }, 3000);
            }
        }

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const searchVal = document.getElementById('search-input').value.toLowerCase().trim();
            grid.innerHTML = '';
            activeCanvases = [];

            const filtered = Object.values(allTokens).filter(token => {
                const address = token.address.toLowerCase();
                const symbol = (token.symbol || '').toLowerCase();
                const name = (token.name || '').toLowerCase();
                const minterName = (token.minter_name || '').toLowerCase();
                
                if (token.ignored) return false;
                
                const isLau = (symbol.includes('lau') || 
                               minterName.includes('lau') || 
                               minterName === 'cho registry' ||
                               address === "0xd32c39fee49391c7952d1b30b15921b0d3b42e69" || 
                               address === "0xed343c0f99c89ed7c3c934a88f90261fd6a9a68b" ||
                               address === "0x3e10ed242ecb3951151e7a07e0a8f43d4f150c0e" ||
                               address === "0xad4e198623a5e2723e19e4d4a6ecf72b1d19fe4b") && 
                              (symbol.length < 16);
                if (!isLau) return false;
                
                return address.includes(searchVal) || symbol.includes(searchVal) || name.includes(searchVal);
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">No active LAU tokens matched your query.</div>';
                return;
            }

            filtered.forEach(token => {
                const card = document.createElement('div');
                card.className = 'lau-card';

                // Single large self-animating radiotelescope hypotrochoid canvas preview
                card.innerHTML = `
                    <div class="image-container">
                        <div class="image-wrapper">
                            <canvas class="radiotelescope-icon" data-address="${token.address}"></canvas>
                            <span class="image-label">TELESCOPE</span>
                        </div>
                    </div>
                    <div class="card-details">
                        <div class="card-header">
                            <span class="token-symbol">${token.symbol}</span>
                            <span class="minter-badge">${token.minter_name || 'Unknown'}</span>
                        </div>
                        <span class="token-name">${token.name}</span>
                        <div class="token-address">${token.address}</div>
                        <button class="btn-compile" onclick="compileDna('${token.address}', this)">COMPILE GENOME DNA</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Initialize canvas details and attach to global animation loop
            document.querySelectorAll(".radiotelescope-icon").forEach(canvas => {
                const address = canvas.getAttribute("data-address");
                const regs = deriveLauRegisters(address);
                const color = getAddressColor(address);
                
                // Set canvas internal dimensions for scaling quality
                canvas.width = 300;
                canvas.height = 185;
                
                activeCanvases.push({
                    canvas: canvas,
                    ctx: canvas.getContext("2d"),
                    regs: regs,
                    color: color,
                    address: address,
                    offsetAngle: Math.random() * Math.PI * 2
                });
            });
        }

        // Global Lightweight Animation Loop for individual icons running the 30s performance timeline
        function animateTelescopes() {
            const time = Date.now() * 0.001;
            
            // Map global time to the 900-frame (30-second at 30fps) evolution timeline cycle
            const frameIndex = Math.floor((time * 30) % 900);
            
            activeCanvases.forEach(item => {
                const ctx = item.ctx;
                const w = item.canvas.width;
                const h = item.canvas.height;
                const regs = item.regs;
                
                // 1. Premium Radial Gradient Background using address color
                const bgGrad = ctx.createRadialGradient(w / 2, h / 2, 5, w / 2, h / 2, h * 0.6);
                const colorBase = item.color.replace('rgb', 'rgba').replace(')', ', 0.08)');
                bgGrad.addColorStop(0, colorBase);
                bgGrad.addColorStop(1, '#060913');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, w, h);
                
                // Draw telemetry radar sweeps in background
                ctx.strokeStyle = "rgba(255, 255, 255, 0.035)";
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.arc(w / 2, h / 2, h * 0.42, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(w / 2, h / 2, h * 0.22, 0, Math.PI * 2);
                ctx.stroke();
                
                // Derive canonical registers and coordinates mapping
                const fx = 1.0 + (regs.channel % 5);
                const fy = 1.0 + (regs.dynamo % 5);
                const fz = 1.0 + (regs.foundation % 5);
                
                const R_hyp = 35.0 + (regs.foundation % 15);
                const r_hyp = 8.0 + (regs.channel % 10);
                const d_hyp = 12.0 + (regs.dynamo % 20);
                const phase = (regs.base % 100) / 100.0 * 2.0 * Math.PI;
                const thetaOffset = time * 0.2; // Slow background orbital rotation
                
                // 2. Compute 3D Coordinates based on current timeline frame index
                function getTimelineCoords(theta) {
                    // YI coordinate path (Lissajous)
                    const lx_yi = 40.0 * Math.sin(fx * theta + phase);
                    const ly_yi = 40.0 * Math.sin(fy * theta);
                    const lz_yi = 40.0 * Math.cos(fz * theta);
                    
                    // LAU coordinate path (Hypotrochoid)
                    const lx_lau = (R_hyp - r_hyp) * Math.cos(theta) + d_hyp * Math.cos(((R_hyp - r_hyp) / r_hyp) * theta + phase + thetaOffset);
                    const ly_lau = (R_hyp - r_hyp) * Math.sin(theta) - d_hyp * Math.sin(((R_hyp - r_hyp) / r_hyp) * theta);
                    const lz_lau = 25.0 * Math.cos(5.0 * theta);
                    
                    let lx, ly, lz;
                    
                    if (frameIndex < 300) {
                        // Phase 1: YI Lissajous
                        lx = lx_yi;
                        ly = ly_yi;
                        lz = lz_yi;
                    } else if (frameIndex < 630) {
                        // Phase 2: Morphing
                        const morphFactor = (frameIndex - 300) / 330.0;
                        lx = lx_yi * (1.0 - morphFactor) + lx_lau * morphFactor;
                        ly = ly_yi * (1.0 - morphFactor) + ly_lau * morphFactor;
                        lz = lz_yi * (1.0 - morphFactor) + lz_lau * morphFactor;
                    } else {
                        // Phase 3: Perfect Tardibear locked pause (with anatomy warp)
                        const TardigradeWarpX = Math.sin(theta * 3) * 5;
                        const TardigradeWarpY = Math.cos(theta * 6) * 3;
                        lx = lx_lau + TardigradeWarpX;
                        ly = ly_lau + TardigradeWarpY;
                        lz = lz_lau;
                    }
                    
                    return { x: lx, y: ly };
                }
                
                // 3. Faint Secondary Depth Curve
                ctx.strokeStyle = item.color.replace('rgb', 'rgba').replace(')', ', 0.12)');
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                const depthSteps = 90;
                for (let i = 0; i <= depthSteps; i++) {
                    const theta = i * 4.0 * Math.PI / depthSteps;
                    const coords = getTimelineCoords(theta);
                    const sx = w / 2 + coords.x * 1.15;
                    const sy = h / 2 + coords.y * 1.15;
                    if (i === 0) ctx.moveTo(sx, sy);
                    else ctx.lineTo(sx, sy);
                }
                ctx.stroke();
                
                // 4. Primary Animated Curve
                ctx.strokeStyle = item.color;
                ctx.lineWidth = 1.8;
                ctx.lineCap = "round";
                ctx.shadowBlur = 6;
                ctx.shadowColor = item.color;
                
                ctx.beginPath();
                const steps = 180;
                
                for (let i = 0; i <= steps; i++) {
                    const theta = i * 4.0 * Math.PI / steps;
                    const coords = getTimelineCoords(theta);
                    const sx = w / 2 + coords.x;
                    const sy = h / 2 + coords.y;
                    
                    if (i === 0) {
                        ctx.moveTo(sx, sy);
                    } else {
                        ctx.lineTo(sx, sy);
                    }
                }
                ctx.stroke();
                ctx.shadowBlur = 0; // reset
            });
            
            requestAnimationFrame(animateTelescopes);
        }

        document.getElementById('search-input').addEventListener('input', renderGallery);

        fetchTokens().then(() => {
            animateTelescopes();
        });
        
        // Refresh registry mappings periodically to pull new tokens
        setInterval(fetchTokens, 15000);
    </script>
</body>
</html>
