<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overture to Crabs - Auncient Microtonal Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050a12;
            --panel-bg: rgba(10, 25, 47, 0.7);
            --border-color: rgba(0, 242, 254, 0.3);
            --accent-cyan: #00f2fe;
            --accent-coral: #ff5e62;
            --accent-green: #39ff14;
            --font-display: 'Orbitron', sans-serif;
            --font-sans: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #e2e8f0;
            font-family: var(--font-sans);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #0d1b2a 0%, #050a12 100%);
        }

        header {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
            margin-bottom: 5px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #8892b0;
            font-weight: 300;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1000px;
            gap: 20px;
            padding: 0 20px 40px 20px;
        }

        .visualizer-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
        }

        canvas {
            width: 100%;
            height: 380px;
            border-radius: 8px;
            background-color: #03070d;
            display: block;
        }

        .controls-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .controls-card {
                grid-template-columns: 1fr;
            }
        }

        .panel-left, .panel-right {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            color: white;
            padding: 12px 24px;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 198, 255, 0.8);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff5e62 0%, #ff9966 100%);
            box-shadow: 0 0 15px rgba(255, 94, 98, 0.4);
        }

        .btn-stop:hover {
            box-shadow: 0 0 25px rgba(255, 94, 98, 0.8);
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: #8892b0;
            display: flex;
            justify-content: space-between;
        }

        .label-val {
            color: var(--accent-cyan);
            font-family: var(--font-display);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #102a43;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-cyan);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        .status-display {
            background: rgba(3, 7, 13, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 8px;
            padding: 15px;
            font-family: var(--font-display);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
        }

        .status-label {
            color: #8892b0;
        }

        .status-val {
            color: var(--accent-cyan);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: #102a43;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(0, 242, 254, 0.2);
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-coral));
            box-shadow: 0 0 10px var(--accent-cyan);
            transition: width 0.1s linear;
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 4px;
            margin-top: 10px;
        }

        .key-btn {
            background: #102a43;
            border: 1px solid rgba(0, 242, 254, 0.2);
            color: #e2e8f0;
            padding: 10px 0;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .key-btn:hover {
            background: var(--accent-cyan);
            color: #03070d;
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .water-ripple-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.08;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 4px, #fff 4px, #fff 8px);
        }
    </style>
</head>
<body>
    <header>
        <h1>OVERTURE TO CRABS</h1>
        <p class="subtitle">Auncient 22-EDO Microtonal Deep Bass & Paradiddle Suite (Duration: 6:30)</p>
    </header>

    <div class="main-container">
        <div class="visualizer-card">
            <canvas id="beachCanvas"></canvas>
            <div class="water-ripple-layer"></div>
        </div>

        <div class="controls-card">
            <div class="panel-left">
                <button id="btnPlay" class="btn">🔊 PLAY OVERTURE</button>
                <button id="btnStop" class="btn btn-stop" style="display: none;">⏹ STOP OVERTURE</button>
                <button id="btnRecord" class="btn" style="margin-top: 10px; background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); box-shadow: 0 0 15px rgba(255, 8, 68, 0.4);">🔴 RECORD HIGH-QUALITY WEBM/MP4</button>

                <div class="slider-group">
                    <label>Master Volume <span id="valMaster" class="label-val">70%</span></label>
                    <input id="slideMaster" type="range" min="0" max="100" value="70">
                </div>

                <div class="slider-group">
                    <label>Sub-Bass Cutoff <span id="valCutoff" class="label-val">220Hz</span></label>
                    <input id="slideCutoff" type="range" min="80" max="1200" value="220">
                </div>

                <div class="slider-group">
                    <label>Tempo (BPM) <span id="valTempo" class="label-val">102</span></label>
                    <input id="slideTempo" type="range" min="80" max="140" value="102">
                </div>
            </div>

            <div class="panel-right">
                <div class="status-display">
                    <div class="status-row">
                        <span class="status-label">Suite Section:</span>
                        <span id="txtSection" class="status-val" style="color: var(--accent-coral)">Stopped</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Active Scale:</span>
                        <span class="status-val">22-EDO Pentatonic</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Time Elapsed:</span>
                        <span id="txtTime" class="status-val">00:00 / 06:30</span>
                    </div>
                    <div class="progress-bar-container">
                        <div id="pBar" class="progress-bar"></div>
                    </div>
                </div>

                <div>
                    <label style="margin-bottom: 5px; display: block;">Interactive Microtonal Keys (Manual Trigger)</label>
                    <div class="keyboard-grid">
                        <button class="key-btn" data-step="0">K0</button>
                        <button class="key-btn" data-step="2">K2</button>
                        <button class="key-btn" data-step="4">K4</button>
                        <button class="key-btn" data-step="6">K6</button>
                        <button class="key-btn" data-step="8">K8</button>
                        <button class="key-btn" data-step="10">K10</button>
                        <button class="key-btn" data-step="12">K12</button>
                        <button class="key-btn" data-step="14">K14</button>
                        <button class="key-btn" data-step="16">K16</button>
                        <button class="key-btn" data-step="18">K18</button>
                        <button class="key-btn" data-step="20">K20</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("beachCanvas");
        const ctx = canvas.getContext("2d");

        // Set high density display backing store
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = 380 * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 22-EDO Frequencies (root C3 = 130.81 Hz)
        const rootFreq = 130.81;
        const edo22 = [];
        for (let i = 0; i < 22; i++) {
            edo22.push(rootFreq * Math.pow(2, i / 22));
        }

        class EcholectricPulse {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.r = 0;
                this.maxR = type === "bass" ? 220 : 160;
                this.speed = type === "bass" ? 4.5 : 6.0;
                this.hitCrabs = new Set();
                
                // Color mapping
                if (type === "bass") this.color = "rgba(186, 104, 200, 0.45)"; // purple
                else if (type === "lead") this.color = "rgba(0, 242, 254, 0.45)"; // cyan
                else if (type === "snare") this.color = "rgba(255, 94, 98, 0.45)"; // pink/coral
                else if (type === "kick") this.color = "rgba(230, 92, 0, 0.45)"; // orange
                else if (type === "hihat") this.color = "rgba(255, 213, 79, 0.45)"; // gold
                else this.color = "rgba(255, 255, 255, 0.45)";
            }

            update(crabs) {
                this.r += this.speed;
                crabs.forEach((c, idx) => {
                    if (this.hitCrabs.has(idx)) return;
                    const dx = c.x - this.x;
                    const dy = c.y - this.y;
                    const dist = Math.hypot(dx, dy);
                    if (Math.abs(dist - this.r) < c.size + 10) {
                        this.hitCrabs.add(idx);
                        // Echolectrocution charge boost
                        c.electroAccumulator = Math.min(10.0, c.electroAccumulator + 0.8);
                        c.sparkFlashTimer = 6;
                        c.sparkSourceX = this.x;
                        c.sparkSourceY = this.y;
                    }
                });
            }

            draw(ctx) {
                const progress = this.r / this.maxR;
                const alpha = 0.08 * (1.0 - progress);
                if (alpha <= 0) return;

                ctx.save();
                let baseRGB = "255, 255, 255";
                if (this.type === "bass") baseRGB = "186, 104, 200";
                else if (this.type === "lead") baseRGB = "0, 242, 254";
                else if (this.type === "snare") baseRGB = "255, 94, 98";
                else if (this.type === "kick") baseRGB = "230, 92, 0";
                else if (this.type === "hihat") baseRGB = "255, 213, 79";

                ctx.strokeStyle = `rgba(${baseRGB}, ${alpha})`;
                ctx.lineWidth = 1;
                ctx.setLineDash([2, 4]);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }
        
        const activePulses = [];

        // Crab definition
        class Crab {
            constructor(x, y, size, color) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.pinchL = 0;
                this.pinchR = 0;
                this.danceOffset = 0;
                this.loveTimer = 0;
                this.speechBubble = "";
                this.speechBubbleTimer = 0;
                this.electroAccumulator = 0;
                this.vaesenMood = "Auncient Serene";
                this.vaesenIntensity = 0.4;
                this.sparkFlashTimer = 0;
                this.sparkSourceX = 0;
                this.sparkSourceY = 0;
            }

            emitPulse(type) {
                activePulses.push(new EcholectricPulse(this.x, this.y, type));
            }

            update(beat, speedFactor, theme) {
                this.x += this.vx * speedFactor;
                this.y += this.vy * speedFactor;

                // Restrict boundaries
                if (this.x < 30 || this.x > 450) this.vx = -this.vx;
                if (this.y < 200 || this.y > 320) this.vy = -this.vy;

                // Sync pinches to beats
                this.pinchL = Math.max(0, this.pinchL - 0.1);
                this.pinchR = Math.max(0, this.pinchR - 0.1);
                this.danceOffset = Math.max(0, this.danceOffset - 0.05);
                this.loveTimer = Math.max(0, this.loveTimer - 1);
                this.speechBubbleTimer = Math.max(0, this.speechBubbleTimer - 1);
                this.sparkFlashTimer = Math.max(0, this.sparkFlashTimer - 1);
                if (beat) {
                    if (Math.random() > 0.4) this.pinchL = 1.0;
                    if (Math.random() > 0.4) this.pinchR = 1.0;
                }

                // Update Vaesen Emotions & Electrolocation Accumulators
                this.updateVaesen(theme);
            }

            updateVaesen(theme) {
                // Environment charge impact
                if (theme === "lava") {
                    this.electroAccumulator = Math.min(10, this.electroAccumulator + 0.08);
                } else if (theme === "deep") {
                    this.electroAccumulator = Math.min(10, this.electroAccumulator + 0.02);
                } else if (theme === "sunset") {
                    this.electroAccumulator = Math.max(0, this.electroAccumulator - 0.03);
                }
                
                // Decay
                this.electroAccumulator = Math.max(0, this.electroAccumulator * 0.96);

                if (theme === "sunset") {
                    if (this.electroAccumulator > 3.0) {
                        this.vaesenMood = "Somber Electra";
                        this.vaesenIntensity = Math.min(1.0, (this.electroAccumulator - 3) / 7);
                    } else {
                        this.vaesenMood = "Melancholy";
                        this.vaesenIntensity = 0.5;
                    }
                } else if (theme === "lava") {
                    if (this.electroAccumulator > 6.0) {
                        this.vaesenMood = "Volcanic Frenzy";
                        this.vaesenIntensity = Math.min(1.0, this.electroAccumulator / 10);
                    } else {
                        this.vaesenMood = "Charged Storm";
                        this.vaesenIntensity = Math.min(1.0, this.electroAccumulator / 6);
                    }
                } else if (theme === "deep") {
                    if (this.electroAccumulator > 4.0) {
                        this.vaesenMood = "Sub-aquatic Pulse";
                        this.vaesenIntensity = Math.min(1.0, this.electroAccumulator / 8);
                    } else {
                        this.vaesenMood = "Deep Trance";
                        this.vaesenIntensity = 0.6;
                    }
                } else {
                    if (this.electroAccumulator > 4.0) {
                        this.vaesenMood = "Electro-Excited";
                        this.vaesenIntensity = Math.min(1.0, this.electroAccumulator / 8);
                    } else {
                        this.vaesenMood = "Auncient Serene";
                        this.vaesenIntensity = 0.4;
                    }
                }
            }

            draw(ctx, frame, index, theme) {
                const cx = this.x;
                const cy = this.y + Math.sin(frame * 0.1 + this.x) * 2 - (this.danceOffset * 15);
                const s = this.size;

                ctx.save();
                ctx.translate(cx, cy);

                // Shadow
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.beginPath();
                ctx.ellipse(0, s/3, s * 1.2, s * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();

                // Electrolocation Aura
                if (this.electroAccumulator > 0.1) {
                    ctx.save();
                    let colorBase = "0, 242, 254";
                    if (theme === "lava") colorBase = "255, 94, 98";
                    else if (theme === "deep") colorBase = "57, 255, 20";
                    else if (theme === "sunset") colorBase = "254, 52, 110";
                    
                    const baseRadius = s * (1.1 + Math.sin(frame * 0.15) * 0.08);
                    const accumOffset = Math.min(this.electroAccumulator * 0.12, 0.8);
                    
                    // Layer 1: Outer soft fill
                    ctx.fillStyle = `rgba(${colorBase}, 0.06)`;
                    ctx.beginPath();
                    ctx.arc(0, 0, baseRadius * (1.5 + accumOffset), 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Layer 2: Middle fill
                    ctx.fillStyle = `rgba(${colorBase}, 0.12)`;
                    ctx.beginPath();
                    ctx.arc(0, 0, baseRadius * (1.2 + accumOffset), 0, Math.PI * 2);
                    ctx.fill();

                    // Layer 3: Inner outline
                    ctx.strokeStyle = `rgba(${colorBase}, 0.25)`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, baseRadius * (1.0 + accumOffset), 0, Math.PI * 2);
                    ctx.stroke();

                    // Electric arcs
                    if (this.electroAccumulator > 3.0) {
                        ctx.strokeStyle = `rgba(${colorBase}, 0.6)`;
                        ctx.lineWidth = 1.5;
                        for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
                            ctx.beginPath();
                            const angle = a + Math.sin(frame * 0.12 + a) * 0.2;
                            const startDist = s * 0.8;
                            const endDist = s * (1.1 + this.electroAccumulator * 0.15);
                            
                            const x1 = Math.cos(angle) * startDist;
                            const y1 = Math.sin(angle) * startDist;
                            
                            const xMid = Math.cos(angle) * ((startDist + endDist) / 2) + (Math.random() - 0.5) * 12;
                            const yMid = Math.sin(angle) * ((startDist + endDist) / 2) + (Math.random() - 0.5) * 12;
                            
                            const x2 = Math.cos(angle) * endDist + (Math.random() - 0.5) * 16;
                            const y2 = Math.sin(angle) * endDist + (Math.random() - 0.5) * 16;
                            
                            ctx.moveTo(x1, y1);
                            ctx.lineTo(xMid, yMid);
                            ctx.lineTo(x2, y2);
                            ctx.stroke();
                        }
                    }
                    ctx.restore();
                }

                // Draw Legs
                ctx.strokeStyle = this.color;
                ctx.lineWidth = s / 5;
                for (let side of [-1, 1]) {
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(side * (s/2), 0);
                        const legAngle = 0.2 + i * 0.3 + Math.sin(frame * 0.15 + this.x + i) * 0.15;
                        const lx = side * (s * 1.2);
                        const ly = s * 0.8;
                        ctx.quadraticCurveTo(side * (s * 0.9), s * 0.1, lx, ly);
                        ctx.stroke();
                    }
                }

                // Draw Shell Body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, s, s * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();

                // Eyes base
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(-s * 0.4, -s * 0.6, s * 0.2, 0, Math.PI * 2);
                ctx.arc(s * 0.4, -s * 0.6, s * 0.2, 0, Math.PI * 2);
                ctx.fill();

                // Pupil Tracking
                let dx = 0;
                let dy = 0;
                if (window.mouseX && window.mouseY) {
                    const eyeX = cx;
                    const eyeY = cy - s * 0.6;
                    const angle = Math.atan2(window.mouseY - eyeY, window.mouseX - eyeX);
                    dx = Math.cos(angle) * (s * 0.08);
                    dy = Math.sin(angle) * (s * 0.08);
                } else {
                    dy = Math.sin(frame * 0.05) * (s * 0.04);
                }

                ctx.fillStyle = "#000000";
                ctx.beginPath();
                ctx.arc(-s * 0.4 + dx, -s * 0.6 + dy, s * 0.09, 0, Math.PI * 2);
                ctx.arc(s * 0.4 + dx, -s * 0.6 + dy, s * 0.09, 0, Math.PI * 2);
                ctx.fill();

                // Left Claw / Pinch
                ctx.strokeStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(-s * 0.6, -s * 0.1);
                const lClawY = -s * 0.8 - (this.pinchL * s * 0.3);
                ctx.lineTo(-s * 1.1, lClawY);
                ctx.stroke();
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(-s * 1.1, lClawY, s * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // Left Pinch Sparkle (Starburst)
                if (this.pinchL > 0.8) {
                    let sparkleColor = "#ffd54f";
                    if (theme === "lava") sparkleColor = "#ffeb3b";
                    else if (theme === "deep") sparkleColor = "#8bc34a";
                    
                    ctx.save();
                    const rays = [
                        { len: 14, angle: 0, col: "#ffffff", w: 3 },
                        { len: 14, angle: Math.PI / 2, col: "#ffffff", w: 3 },
                        { len: 9, angle: Math.PI / 4, col: sparkleColor, w: 2 },
                        { len: 9, angle: -Math.PI / 4, col: sparkleColor, w: 2 },
                        { len: 18, angle: 0, col: sparkleColor, w: 1 },
                        { len: 18, angle: Math.PI / 2, col: sparkleColor, w: 1 }
                    ];
                    rays.forEach(r => {
                        ctx.strokeStyle = r.col;
                        ctx.lineWidth = r.w;
                        ctx.beginPath();
                        const dx = Math.cos(r.angle) * r.len;
                        const dy = Math.sin(r.angle) * r.len;
                        ctx.moveTo(-s * 1.1 - dx, lClawY - dy);
                        ctx.lineTo(-s * 1.1 + dx, lClawY + dy);
                        ctx.stroke();
                    });
                    ctx.restore();
                }

                // Right Claw / Pinch
                ctx.strokeStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(s * 0.6, -s * 0.1);
                const rClawY = -s * 0.8 - (this.pinchR * s * 0.3);
                ctx.lineTo(s * 1.1, rClawY);
                ctx.stroke();
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(s * 1.1, rClawY, s * 0.3, 0, Math.PI * 2);
                ctx.fill();

        const crabs = [

        function animate() {
            frameCount++;

            // Draw Volumetric refracted rays
            ctx.fillStyle = rayColor;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                const rayOffset = Math.sin(frameCount * 0.01 + i) * 60;
                ctx.moveTo(w/2 + rayOffset, 0);
                ctx.lineTo(w/2 - 100 + rayOffset * 1.5, 200);
                ctx.lineTo(w/2 + 100 + rayOffset * 1.5, 200);
                ctx.closePath();

            // Draw shoreline sand
            const sandGrad = ctx.createLinearGradient(0, 200, 0, h);

            const waveY = 195 + Math.sin(frameCount * 0.04) * 8;

            ctx.moveTo(0, waveY);
            for (let x = 0; x <= w; x += 20) {

            }
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.closePath();

            // Foam edge
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";

            for (let i = 0; i < crabs.length; i++) {
                for (let j = i + 1; j < crabs.length; j++) {
                    const c1 = crabs[i];
                    const c2 = crabs[j];
                    const dist = Math.hypot(c2.x - c1.x, c2.y - c1.y);
                    if (dist < 150) {
                        const electroCharge = (150 - dist) * 0.02;
                        c1.electroAccumulator = Math.min(10, c1.electroAccumulator + electroCharge);
                        c2.electroAccumulator = Math.min(10, c2.electroAccumulator + electroCharge);

            // Crab-to-crab collision check and resolution
            for (let i = 0; i < crabs.length; i++) {
                for (let j = i + 1; j < crabs.length; j++) {
                    const c1 = crabs[i];
                    const c2 = crabs[j];
                    const dx = c2.x - c1.x;
                    const dy = c2.y - c1.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = (c1.size + c2.size) * 1.3;
                    if (dist < minDist) {
                        const overlap = minDist - dist;
                        const angle = Math.atan2(dy, dx);
                        
                        // Push apart
                        const forceX = Math.cos(angle) * overlap * 0.5;
                        const forceY = Math.sin(angle) * overlap * 0.5;
                        c1.x -= forceX;
                        c1.y -= forceY;
                        c2.x += forceX;
                        c2.y += forceY;

                        // Swap velocities (elastic bounce)
                        const tvx = c1.vx; c1.vx = c2.vx; c2.vx = tvx;
                        const tvy = c1.vy; c1.vy = c2.vy; c2.vy = tvy;

                        c2.pinchL = 1.0; c2.pinchR = 1.0;

                    }
                }
            }

            crabs.forEach((c, idx) => {
                c.draw(ctx, frameCount, idx, theme);

            // CRT overlay grid lines
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            for (let y = 0; y < h; y += 4) {

        function playSubBassNote(freq, dur, multiplier = 1.0) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // Sub Voice 1: Triangle base
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = "triangle";
            
            // Sub Voice 2: Saw blend
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = "sawtooth";

            // Sub Voice 3: Square wave grit
            const osc3 = audioCtx.createOscillator();
            const gain3 = audioCtx.createGain();
            osc3.type = "square";

            // Distortion for booty bass saturation
            const dist = audioCtx.createWaveShaper();
            const makeDistortionCurve = (amount) => {
                const k = typeof amount === 'number' ? amount : 50;
                const n_samples = 44100;
                const curve = new Float32Array(n_samples);
                const deg = Math.PI / 180;
                for (let i = 0; i < n_samples; ++i) {
                    const x = (i * 2) / n_samples - 1;
                    curve[i] = ((3 + k) * x * 20 * deg) / (Math.PI + k * Math.abs(x));
                }
                return curve;
            };
            dist.curve = makeDistortionCurve(30);
            dist.oversample = '4x';

            // Booty Bass pitch sweeps for that sliding bounce
            osc1.frequency.setValueAtTime(freq * 1.8, now);
            osc1.frequency.exponentialRampToValueAtTime(freq * 0.9, now + 0.15);
            osc2.frequency.setValueAtTime(freq * 1.8, now);
            osc2.frequency.exponentialRampToValueAtTime(freq * 0.9, now + 0.15);
            osc3.frequency.setValueAtTime(freq * 1.8, now);
            osc3.frequency.exponentialRampToValueAtTime(freq * 0.9, now + 0.15);

            // Filter envelope sweep (classic booty bass filter modulation)
            if (filterNode) {
                filterNode.frequency.setValueAtTime(180, now);
                filterNode.frequency.exponentialRampToValueAtTime(650, now + 0.08);
                filterNode.frequency.exponentialRampToValueAtTime(220, now + dur);
            }

            gain1.gain.setValueAtTime(0.50 * multiplier, now);
            gain1.gain.exponentialRampToValueAtTime(0.0001, now + dur);

            gain2.gain.setValueAtTime(0.25 * multiplier, now);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + dur);

            gain3.gain.setValueAtTime(0.20 * multiplier, now);
            gain3.gain.exponentialRampToValueAtTime(0.0001, now + dur);

            osc1.connect(gain1);
            osc2.connect(gain2);
            osc3.connect(gain3);

            gain1.connect(dist);
            gain2.connect(dist);
            gain3.connect(dist);

            dist.connect(filterNode);

            osc1.start(now);
            osc1.stop(now + dur);
            osc2.start(now);
            osc2.stop(now + dur);
            osc3.start(now);
            osc3.stop(now + dur);
        }

        function playLeadSynth(freq, dur) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(freq, now);

            // Subtle vibrato
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.setValueAtTime(6, now); // 6 Hz modulation
            lfoGain.gain.setValueAtTime(4, now);

            lfo.connect(lfoGain);
            lfoGain.connect(osc.frequency);

            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

            osc.connect(gain);
            gain.connect(mainGain); // bypass lowpass filter for crispy lead highs

            lfo.start(now);
            osc.start(now);

            lfo.stop(now + dur);
            osc.stop(now + dur);
        }

        function playPerididdle(isSnare, isKick, isHat) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(120, now);

                gain.gain.setValueAtTime(0.5, now);
                gain.gain.linearRampToValueAtTime(0.001, now + 0.15);

                osc.connect(gain);
                gain.connect(mainGain);
                osc.start(now);
                osc.stop(now + 0.15);

            if (isSnare) {

                const bufferSize = audioCtx.sampleRate * 0.15;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = "highpass";
                filter.frequency.setValueAtTime(1000, now);

                gain.gain.setValueAtTime(0.12, now);

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.06, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(mainGain);

                noise.start(now);
                noise.stop(now + 0.04);
            }

        // Quantized step sequencing loop
        function scheduleTick() {

            const minScale = [0, 4, 6, 10, 14, 16, 20];
            const scaleSteps = (section.theme === "deep") ? minScale : majScale;
            const melody = melodies[section.melody];
            const noteDeg = melody[stepIndex % melody.length];
            const degree = noteDeg % 7;
            const octave = Math.floor(noteDeg / 7);
            const finalStep = section.rootKey + scaleSteps[degree] + (octave * 22);
            const baseFreq = rootFreq * Math.pow(2, finalStep / 22);

            // Rolling Drum and Bass Sub Bass Roots
            if (subStep === 0 || subStep === 8 || (subStep === 10 && Math.random() > 0.4)) {
                const bassStep = (subStep === 8 && Math.random() > 0.5) ? section.rootKey + 14 - 22 : section.rootKey - 22;
                const subBassFreq = rootFreq * Math.pow(2, bassStep / 22);
                playSubBassNote(subBassFreq, stepDuration * 3, section.bass);
                crabs[0].danceOffset = 1.0;
                crabs[0].pinchL = 1.0;
                crabs[0].emitPulse("bass");
            } else if (subStep === 4 || subStep === 12) {
                const subBassFreq = rootFreq * Math.pow(2, (section.rootKey - 22) / 22);
                playSubBassNote(subBassFreq, stepDuration * 2, section.bass);
                crabs[0].danceOffset = 0.8;
                crabs[0].pinchR = 1.0;
                crabs[0].emitPulse("bass");
            }

            // Melodic Lead Patterns (Crab 1 plays Elton John melodies & sings the lyrics syllable-by-syllable!)
            if (subStep % 2 === 0) {
                playLeadSynth(baseFreq * 2, stepDuration * 1.5);
                crabs[1].danceOffset = 0.8;
                crabs[1].pinchL = 1.0;
                crabs[1].emitPulse("lead");
                
                // Real-time vocoder lyric syllables
                const songLyrics = lyrics[section.melody];
                const lyricIdx = Math.floor(stepIndex / 2) % songLyrics.length;
                const word = songLyrics[lyricIdx];
                crabs[1].speechBubble = word;
                crabs[1].speechBubbleTimer = 6;
                singWord(word, baseFreq * 2);
            }

            // Counterpoint melody (Crab 5 canon delayed by 3 steps)
            if (subStep % 2 === 1) {
                const prevNoteDeg = melody[Math.max(0, stepIndex - 3) % melody.length];
                const prevDeg = prevNoteDeg % 7;
                const prevOct = Math.floor(prevNoteDeg / 7);
                const prevStep = section.rootKey + scaleSteps[prevDeg] + (prevOct * 22);
                const prevFreq = rootFreq * Math.pow(2, prevStep / 22);
                playLeadSynth(prevFreq * 2, stepDuration * 1.0);
                crabs[5].danceOffset = 0.6;
                crabs[5].pinchR = 1.0;
                crabs[5].emitPulse("lead");
            }

            // Paradiddle Drum Rhythms (Kick, Snare, Hihat)
            const rRhythm = [1, 0, 1, 1, 0, 1, 0, 0];
            const lRhythm = [0, 1, 0, 0, 1, 0, 1, 1];
            const isR = rRhythm[stepIndex % 8];
            const isL = lRhythm[stepIndex % 8];

            // Scale drum hits by section.density
            const drumChance = section.density;
            const playDrums = Math.random() <= drumChance;

            if (playDrums) {
                playPerididdle(isL, isR, (stepIndex % 2 === 0));
                // Snare Drummer (Crab 2)
                if (isL) {
                    crabs[2].pinchL = 1.0;
                    crabs[2].pinchR = 1.0;
                    crabs[2].danceOffset = 0.7;
                    crabs[2].emitPulse("snare");
                }
                // Bass/Kick Drummer (Crab 3)
                if (isR) {
                    crabs[3].pinchL = 1.0;
                    crabs[3].pinchR = 1.0;
                    crabs[3].danceOffset = 0.9;
                    crabs[3].emitPulse("kick");
                }
                // Hi-Hat Drummer (Crab 4)
                if (stepIndex % 2 === 0) {
                    crabs[4].pinchL = 1.0;
                    crabs[4].pinchR = 1.0;
                    crabs[4].emitPulse("hihat");
                }
            } else {
                // ambient sparse hihats
                if (stepIndex % 4 === 0 && Math.random() > 0.4) {
                    playPerididdle(false, false, true);
                    crabs[4].pinchL = 1.0;
                    crabs[4].pinchR = 1.0;
                    crabs[4].emitPulse("hihat");
                }
            }


            stepIndex++;
            sequenceTimer = setTimeout(scheduleTick, stepDuration * 1000);
        }

        // Web Audio Formant Synthesizer for Crab Singing
        function singWord(word, pitchFreq = 140) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // Map vowels to resonant frequencies (F1, F2 formant pairs)
            const formants = {
                "a": [730, 1090],
                "e": [270, 2290],
                "i": [300, 2200],
                "o": [570, 840],
                "u": [300, 870],
                "space": [0, 0]
            };
            
            // Extract vowel-like timeline from word
            let timeOffset = 0;
            for (let char of word) {
                let fPair = formants[char] || formants["a"]; // default to 'a' vowel formant
                if (char === " ") fPair = formants["space"];
                
                if (fPair[0] > 0) {
                    const dur = 0.15;
                    const osc = audioCtx.createOscillator();
                    osc.type = "sawtooth";
                    osc.frequency.setValueAtTime(pitchFreq + Math.sin(timeOffset * 10) * 10, now + timeOffset); // voice pitch
                    
                    // Filter 1 (F1 Formant)
                    const filter1 = audioCtx.createBiquadFilter();
                    filter1.type = "bandpass";
                    filter1.frequency.setValueAtTime(fPair[0], now + timeOffset);
                    filter1.Q.setValueAtTime(8, now + timeOffset);
                    
                    // Filter 2 (F2 Formant)
                    const filter2 = audioCtx.createBiquadFilter();
                    filter2.type = "bandpass";
                    filter2.frequency.setValueAtTime(fPair[1], now + timeOffset);
                    filter2.Q.setValueAtTime(8, now + timeOffset);
                    
                    const voiceGain = audioCtx.createGain();
                    voiceGain.gain.setValueAtTime(0.08, now + timeOffset);
                    voiceGain.gain.exponentialRampToValueAtTime(0.0001, now + timeOffset + dur);
                    
                    osc.connect(filter1);
                    osc.connect(filter2);
                    filter1.connect(voiceGain);
                    filter2.connect(voiceGain);
                    voiceGain.connect(mainGain);
                    
                    osc.start(now + timeOffset);
                    osc.stop(now + timeOffset + dur);
                }
                timeOffset += 0.18;
            }
        }

        // Time updates
        setInterval(() => {
            if (!window.musicPlaying) return;
            overtureTime++;

            if (overtureTime >= 390) {
                stopOverture();
                return;
            }

            // Display formatted elapsed time
            const m = String(Math.floor(overtureTime / 60)).padStart(2, '0');
            const s = String(overtureTime % 60).padStart(2, '0');
            document.getElementById("txtTime").innerText = `${m}:${s} / 06:30`;

            const percent = (overtureTime / 390) * 100;
            document.getElementById("pBar").style.width = `${percent}%`;
        }, 1000);

        function startOverture() {
            initAudio();
            window.musicPlaying = true;
            overtureTime = 0;
            stepIndex = 0;
            document.getElementById("btnPlay").style.display = "none";
            document.getElementById("btnStop").style.display = "block";
            scheduleTick();
        }

        function stopOverture() {
            window.musicPlaying = false;
            if (sequenceTimer) clearTimeout(sequenceTimer);
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
            document.getElementById("btnPlay").style.display = "block";
            document.getElementById("btnStop").style.display = "none";
            document.getElementById("txtSection").innerText = "Stopped";
            document.getElementById("txtTime").innerText = "00:00 / 06:30";
            document.getElementById("pBar").style.width = "0%";
            overtureTime = 0;
        }

        document.getElementById("btnPlay").addEventListener('click', startOverture);
        document.getElementById("btnStop").addEventListener('click', stopOverture);

        // Recording Implementation
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;

        function toggleRecord() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            if (!audioCtx) initAudio();
            if (!window.musicPlaying) startOverture();
            
            recordedChunks = [];
            isRecording = true;
            
            // Capture synthesized audio
            const dest = audioCtx.createMediaStreamDestination();
            mainGain.connect(dest);
            
            // Capture canvas video stream
            const videoStream = canvas.captureStream(30);
            
            // Combine video and audio tracks
            const combinedStream = new MediaStream([
                ...videoStream.getVideoTracks(),
                ...dest.stream.getAudioTracks()
            ]);
            
            const options = { mimeType: 'video/webm;codecs=vp9,opus', videoBitsPerSecond: 4000000 };
            try {
                mediaRecorder = new MediaRecorder(combinedStream, options);
            } catch (e) {
                mediaRecorder = new MediaRecorder(combinedStream, { videoBitsPerSecond: 3000000 });
            }
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'crabs_overture_render.webm';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
            };
            
            mediaRecorder.start();
            document.getElementById("btnRecord").innerText = "⏹ STOP & SAVE WEBM/MP4";
            document.getElementById("btnRecord").style.background = "linear-gradient(135deg, #f80759 0%, #bc4e9c 100%)";
        }

        function stopRecording() {
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
            stopOverture();
            document.getElementById("btnRecord").innerText = "🔴 RECORD HIGH-QUALITY WEBM/MP4";
            document.getElementById("btnRecord").style.background = "linear-gradient(135deg, #ff0844 0%, #ffb199 100%)";
        }

        document.getElementById("btnRecord").addEventListener('click', toggleRecord);

        // Control Sliders events
        document.getElementById("slideMaster").addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById("valMaster").innerText = `${val}%`;
            if (mainGain && audioCtx) {
                mainGain.gain.setValueAtTime(val / 100 * 0.5, audioCtx.currentTime);
            }
        });

        document.getElementById("slideCutoff").addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById("valCutoff").innerText = `${val}Hz`;
            if (filterNode && audioCtx) {
                filterNode.frequency.setValueAtTime(val, audioCtx.currentTime);
            }
        });

        document.getElementById("slideTempo").addEventListener('input', (e) => {
            document.getElementById("valTempo").innerText = e.target.value;
        });

        // Manual microtonal key buttons
        document.querySelectorAll(".key-btn").forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (!audioCtx) initAudio();
                const step = Number(e.target.getAttribute("data-step"));
                const freq = edo22[step];
                
                // Play manual note
                playLeadSynth(freq * 2, 0.4);
                playSubBassNote(freq, 0.4);

                // Make a random crab pinch claws
                const randomCrab = crabs[Math.floor(Math.random() * crabs.length)];
                randomCrab.pinchL = 1.0;
                randomCrab.pinchR = 1.0;
            });
        });
        window.mouseX = 0;
        window.mouseY = 0;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            const scaleX = canvas.width / rect.width / window.devicePixelRatio;
            const scaleY = canvas.height / rect.height / window.devicePixelRatio;
            window.mouseX = clickX * scaleX;
            window.mouseY = clickY * scaleY;
        });

        canvas.addEventListener('mouseleave', () => {
            window.mouseX = 0;
            window.mouseY = 0;
        });

        // Canvas click controller: click crabs to trigger synthesizers and jumps
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            const scaleX = canvas.width / rect.width / window.devicePixelRatio;
            const scaleY = canvas.height / rect.height / window.devicePixelRatio;
            const canvasX = clickX * scaleX;
            const canvasY = clickY * scaleY;
            
            crabs.forEach((c, idx) => {
                const dist = Math.hypot(canvasX - c.x, canvasY - c.y);
                if (dist < c.size * 1.8) {
                    c.pinchL = 1.0;
                    c.pinchR = 1.0;
                    c.danceOffset = 1.0;
                    c.vx = -c.vx;
                    
                    if (!audioCtx) initAudio();
                    
                    if (idx === 0) {
                        playSubBassNote(edo22[4], 0.6, 2.0);
                    } else if (idx === 1) {
                        playLeadSynth(edo22[12], 0.5);
                    } else if (idx === 2) {
                        playPerididdle(true, false, false);
                    } else if (idx === 3) {
                        playPerididdle(false, true, false);
                    } else if (idx === 4) {
                        playPerididdle(false, false, true);
                    } else {
                        playLeadSynth(edo22[16] * 2, 0.4);
                        playSubBassNote(edo22[8], 0.4, 1.2);
                    }
                }
            });
        });
    </script>
