<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSFi2 Documentation Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <!-- Marked Markdown Parser CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>
    <div class="glass-bg-container">
        <!-- Navigation / Header -->
        <header>
            <div class="logo">
                <span class="pulse-glow">ATROPA</span>
                <span class="subtitle">Documentation Hub</span>
            </div>
            <div class="header-actions">
                <a href="/index.html" class="btn btn-secondary">Dashboard</a>
                <a href="/datamost.html" class="btn btn-secondary">Datamost Console</a>
                <a href="/protecto.html" class="btn btn-secondary" style="border-color: var(--neon-magenta); color: var(--text-primary); text-shadow: 0 0 5px var(--neon-magenta);">Protecto Console</a>
                <a href="/bgraph.html" class="btn btn-secondary" style="border-color: var(--neon-blue); color: var(--text-primary); text-shadow: 0 0 5px var(--neon-blue);">B/Graph Console</a>
                <a href="/sally_larsen_c64.html" class="btn btn-secondary" style="border-color: #3cbcfc; color: #e2e8f0; text-shadow: 0 0 5px #3cbcfc;">C64 Sprite Console</a>
                <a href="/dragons_lair.html" class="btn btn-secondary" style="border-color: #ffaa00; color: #e2e8f0; text-shadow: 0 0 5px #ffaa00;">Dragon's Lair</a>
                <a href="/star_castle.html" class="btn btn-secondary" style="border-color: #00f2fe; color: #e2e8f0; text-shadow: 0 0 5px #00f2fe;">Star Castle</a>
                <a href="/zmachine.html" class="btn btn-secondary" style="border-color: #8a2be2; color: #e2e8f0; text-shadow: 0 0 5px #8a2be2;">Z-Machine</a>
                <a href="/wallet.html" class="btn btn-secondary">Wallet Hub</a>
            </div>
        </header>

        <!-- Main Guide Container -->
        <main class="dashboard-grid" style="display: grid; grid-template-columns: 280px 1fr; gap: 20px; align-items: start;">
            <!-- Left Side: Documents Index -->
            <section class="card" style="padding: 20px; border-color: var(--neon-magenta); box-shadow: 0 0 15px rgba(255, 0, 127, 0.1);">
                <h3 style="font-family: 'Orbitron', sans-serif; color: var(--neon-magenta); margin-top: 0; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid rgba(255, 0, 127, 0.3); padding-bottom: 5px; text-shadow: 0 0 5px rgba(255, 0, 127, 0.2);">DOCUMENTATION INDEX</h3>
                <ul id="docsMenu" style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px;">
                    <li><button class="btn btn-secondary" data-file="local_deployment_guide.md" style="width: 100%; text-align: left; font-size: 0.9rem; padding: 10px;">🚀 EVM Deployment Guide</button></li>
                    <li><button class="btn btn-secondary" data-file="interrupt_standards.md" style="width: 100%; text-align: left; font-size: 0.9rem; padding: 10px;">🎹 Interrupt Synth Standards</button></li>
                    <li><button class="btn btn-secondary" data-file="software_to_go_library.md" style="width: 100%; text-align: left; font-size: 0.9rem; padding: 10px;">📁 Software to Go Library</button></li>
                    <li><button class="btn btn-secondary" data-file="msd_tax_and_security_analysis.md" style="width: 100%; text-align: left; font-size: 0.9rem; padding: 10px;">🛡️ MSD Security & Tax</button></li>
                    <li><button class="btn btn-secondary" data-file="micro_world_printer_integration.md" style="width: 100%; text-align: left; font-size: 0.9rem; padding: 10px;">🖨️ Micro World Printer</button></li>
                    <li><button class="btn btn-secondary" data-file="protecto_enterprises_integration.md" style="width: 100%; text-align: left; font-size: 0.9rem; padding: 10px;">📦 Protecto B128 Liquidation</button></li>
                    <li><button class="btn btn-secondary" data-file="onchain_cabs_accounting_ledger.md" style="width: 100%; text-align: left; font-size: 0.9rem; padding: 10px;">📈 CABS On-Chain Ledger</button></li>
                    <li><button class="btn btn-secondary" data-file="b128_6509_emulation_support.md" style="width: 100%; text-align: left; font-size: 0.9rem; padding: 10px;">📟 B128 & 6509 Emulation</button></li>
                </ul>
            </section>

            <!-- Right Side: Content Area -->
            <section class="card" style="padding: 40px; line-height: 1.6; font-size: 1.1rem; color: var(--text-primary); border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);">
                <div id="docsContent" class="markdown-body">
                    <div class="placeholder">Loading documentation...</div>
                </div>
            </section>
        </main>

        <footer>
            <div class="terminal-header">
                <h3>Docs Status</h3>
            </div>
            <div class="terminal-body" id="consoleLogs" style="max-height: 80px; overflow-y: auto;">
                <div class="log-line info">Loaded guide from secure local storage node successfully.</div>
            </div>
        </footer>
    </div>

    <script>
        let activeDocName = 'local_deployment_guide.md';

        async function loadDocs(docFile) {
            try {
                document.getElementById('docsContent').innerHTML = `<div class="placeholder">Loading ${docFile}...</div>`;
                const response = await fetch(`/api/docs?doc=${docFile}`);
                if (!response.ok) {
                    throw new Error('Failed to fetch documentation');
                }
                const markdown = await response.text();
                document.getElementById('docsContent').innerHTML = marked.parse(markdown);
                
                // Log action to panel
                const consoleLogs = document.getElementById('consoleLogs');
                consoleLogs.innerHTML += `<div class="log-line info">Successfully loaded ${docFile} from storage node.</div>`;
                consoleLogs.scrollTop = consoleLogs.scrollHeight;
            } catch (err) {
                document.getElementById('docsContent').innerHTML = `<div class="error">Error loading documentation: ${err.message}</div>`;
            }
        }

        document.querySelectorAll('#docsMenu button').forEach(btn => {
            btn.addEventListener('click', () => {
                // Clear active states
                document.querySelectorAll('#docsMenu button').forEach(b => {
                    b.style.borderColor = '';
                    b.style.color = '';
                    b.style.boxShadow = '';
                });
                
                // Add active state to clicked button
                btn.style.borderColor = 'var(--neon-magenta)';
                btn.style.color = 'var(--neon-magenta)';
                btn.style.boxShadow = '0 0 8px rgba(255, 0, 127, 0.4)';
                
                const file = btn.getAttribute('data-file');
                loadDocs(file);
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            // Style initial active button
            const initBtn = document.querySelector('#docsMenu button[data-file="local_deployment_guide.md"]');
            if (initBtn) {
                initBtn.style.borderColor = 'var(--neon-magenta)';
                initBtn.style.color = 'var(--neon-magenta)';
                initBtn.style.boxShadow = '0 0 8px rgba(255, 0, 127, 0.4)';
            }
            loadDocs(activeDocName);
        });
    </script>
    <style>
        /* Additional styled overrides for rendered markdown */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            margin-top: 25px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.2);
        }
        .markdown-body p {
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        .markdown-body code {
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--neon-purple);
        }
        .markdown-body pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        .markdown-body pre code {
            border: none;
            padding: 0;
            background: transparent;
            color: var(--text-primary);
        }
        .markdown-body ul, .markdown-body ol {
            margin-left: 20px;
            margin-bottom: 20px;
        }
        .markdown-body li {
            margin-bottom: 8px;
        }
        .markdown-body a {
            color: var(--neon-blue);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .markdown-body a:hover {
            color: var(--neon-purple);
            text-shadow: 0 0 8px var(--neon-purple);
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: left;
        }
        .markdown-body th {
            background: rgba(0, 242, 254, 0.1);
            color: var(--neon-blue);
        }
    </style>
    <script src="checklist_widget.js"></script>
</body>
</html>
