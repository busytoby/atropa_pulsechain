<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Castle - Vector Graphics Arcade Simulator</title>
    <meta name="description" content="An interactive vector graphics tribute to the 1980 arcade classic Star Castle. Experience retro XY vector CRT rendering, glowing lines, and synth audio!">
    <style>
        :root {
            --primary: #00f2fe;
            --primary-glow: rgba(0, 242, 254, 0.6);
            --ring-outer: #ff007f;
            --ring-mid: #ffaa00;
            --ring-inner: #00e676;
            --background: #030105;
            --panel-bg: rgba(12, 8, 18, 0.95);
            --border: rgba(0, 242, 254, 0.3);
            --text: #ece5fa;
            --glow-color: rgba(0, 242, 254, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #11051b 0%, var(--background) 100%);
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2.8rem;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow), 0 0 30px rgba(0, 242, 254, 0.3);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-align: center;
            font-weight: 900;
        }

        .subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.15rem;
            color: #b3a4cf;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(179, 164, 207, 0.3);
        }

        .cabinet {
            background: var(--panel-bg);
            border: 3px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.2), 
                        inset 0 0 30px rgba(0, 242, 254, 0.1),
                        0 20px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 680px;
            position: relative;
        }

        /* Ambient neon bar on the cabinet */
        .cabinet::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            box-shadow: 0 0 15px var(--primary);
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #000;
            border: 8px solid #1a1226;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.8);
        }

        /* Curved screen overlay to simulate old CRT tubes */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.7) 100%),
                        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 100%, 100% 4px;
            z-index: 10;
            pointer-events: none;
            mix-blend-mode: overlay;
            opacity: 0.85;
        }

        /* Subtle phospher screen flicker */
        @keyframes crt-flicker {
            0% { opacity: 0.975; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .crt-flicker-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 242, 254, 0.015);
            pointer-events: none;
            z-index: 9;
            animation: crt-flicker 0.15s infinite;
        }

        .controls-info {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.015);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            text-align: center;
            color: #b2a7c4;
            line-height: 1.5;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .controls-info strong {
            color: var(--primary);
            text-shadow: 0 0 5px var(--primary-glow);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
        }

        .btn {
            flex: 1;
            background: linear-gradient(135deg, #1e1130 0%, #0b0712 100%);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
            color: #fff;
        }

        .nav-link {
            margin-top: 25px;
            color: var(--primary);
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--primary-glow);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Star Castle</h1>
    <div class="subtitle">XY Vector-CRT Monitor Emulation (Cinematronics 1980)</div>

    <div class="cabinet">
        <div class="canvas-container">
            <div class="crt-overlay"></div>
            <div class="crt-flicker-layer"></div>
            <canvas id="vectorCanvas"></canvas>
        </div>

        <div class="btn-group">
            <button class="btn" id="btnStart" onclick="startGame()">Start Game</button>
            <button class="btn" id="btnAiToggle" onclick="toggleAiMode()">AI Mode: Off</button>
            <button class="btn" onclick="resetGame()">Reset</button>
        </div>

        <div class="btn-group" style="margin-top: 10px; width: 100%;">
            <button class="btn" id="btnMint" onclick="mintHarvestToLedger()" style="border-color: #ffa500; color: #ffa500; background: rgba(255, 165, 0, 0.05);">🔮 Mint Harvest to Ledger</button>
        </div>

        <!-- Color pickers grid -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; color: #a59cb4; border: 1px solid rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <label>Outer Ring:</label>
                <input type="color" id="colOuter" value="#ff007f" onchange="updateColors()" style="border: none; background: transparent; cursor: pointer; width: 30px; height: 30px;">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <label>Mid Ring:</label>
                <input type="color" id="colMid" value="#ffaa00" onchange="updateColors()" style="border: none; background: transparent; cursor: pointer; width: 30px; height: 30px;">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <label>Inner Ring:</label>
                <input type="color" id="colInner" value="#00e676" onchange="updateColors()" style="border: none; background: transparent; cursor: pointer; width: 30px; height: 30px;">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <label>Ship / Core:</label>
                <input type="color" id="colPrimary" value="#00f2fe" onchange="updateColors()" style="border: none; background: transparent; cursor: pointer; width: 30px; height: 30px;">
            </div>
        </div>

        <div class="controls-info">
            <strong>[A / D]</strong> Rotate Ship &nbsp;|&nbsp; 
            <strong>[W]</strong> Thrust &nbsp;|&nbsp; 
            <strong>[SPACE / J]</strong> Fire Laser
            <br>
            Destroy the rotating energy shields to strike the central castle core!
        </div>
    </div>

    <div style="display: flex; gap: 20px; margin-top: 25px;">
        <a href="index.html" class="nav-link">← Back to Main Console</a>
        <a href="ledger.html" class="nav-link" style="color: var(--ring-mid);">🔮 Go to Alchemical Ledger</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.0/ethers.umd.min.js"></script>

    <script>
        const canvas = document.getElementById("vectorCanvas");
        const ctx = canvas.getContext("2d");

        // Set logical sizes
        const size = 600;
        canvas.width = size;
        canvas.height = size;

        // Audio Setup
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let engineOsc = null;
        let engineGain = null;

        function initEngineSound() {
            try {
                if (engineOsc) return; // already initialized
                
                engineOsc = audioCtx.createOscillator();
                engineGain = audioCtx.createGain();
                
                engineOsc.type = "triangle";
                engineOsc.frequency.setValueAtTime(60, audioCtx.currentTime);
                engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
                
                engineOsc.connect(engineGain);
                engineGain.connect(audioCtx.destination);
                engineOsc.start(0);
            } catch(e) {
                console.error("Audio engine init error:", e);
            }
        }
        
        function playLaserSound() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } catch(e) {}
        }

        function playExplodeSound(freq) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "triangle";
                osc.frequency.setValueAtTime(freq || 150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        // Web3 Ledger & Game Contract Integration Configuration
        let provider;
        let signer;
        let starCastleContract;
        let config = {};
        
        const starCastleAddress = "0xCd1963be7AEf4b3819AE6Cc1340962319eD6b237";
        const ledgerAddress = "0xDEb3626C53C52C544A0702Ec3f0A881C8d1d3678";
        
        const starCastleABI = [
            "function initializeGame() external returns (uint256, uint256, uint256, uint256, uint256, uint256)",
            "function recordHarvest(uint256 score, uint256 lives, uint256 lead, uint256 mercury, uint256 sulfur, uint256 status) external returns (uint256)",
            "function getHarvestState() external view returns (uint256, uint256, uint256, uint256, uint256, uint256)",
            "function mintHarvestOnChain(address ledgerAddr) external returns (uint256)"
        ];

        async function initWeb3() {
            try {
                const res = await fetch("/api/config");
                if (res.ok) {
                    config = await res.json();
                }
            } catch (e) {
                console.warn("Config loading error, using static fallback addresses:", e);
            }
        }

        async function mintHarvestToLedger() {
            if (!leadHarvested && !mercuryHarvested && !sulfurHarvested) {
                alert("No alchemical reagents harvested yet! Break shield segments or the core to harvest reagents.");
                return;
            }
            
            try {
                if (typeof window.ethereum === "undefined") {
                    alert("Browser wallet not found. Please install MetaMask or run on an Ethereum-enabled browser.");
                    return;
                }
                
                await initWeb3();
                const activeStarCastleAddr = (config.networks && config.networks.localhost && config.networks.localhost.starCastleAddress) || starCastleAddress;
                const activeLedgerAddr = (config.networks && config.networks.localhost && config.networks.localhost.ledgerAddress) || ledgerAddress;

                await window.ethereum.request({ method: 'eth_requestAccounts' });
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                
                starCastleContract = new ethers.Contract(activeStarCastleAddr, starCastleABI, signer);
                
                const btn = document.getElementById("btnMint");
                btn.disabled = true;
                btn.innerText = "⏳ Recording & Minting to Ledger...";
                
                // 1. Record current game telemetry on-chain in the StarCastle contract
                console.log("Recording harvest state on-chain...");
                const status = gameActive ? 1 : 2;
                const recordTx = await starCastleContract.recordHarvest(score, lives, leadHarvested, mercuryHarvested, sulfurHarvested, status);
                await recordTx.wait();

                // 2. Trigger on-chain minting (makes cross-contract calls from StarCastle -> ZarrellaLedger)
                console.log("Triggering on-chain cross-contract ledger minting...");
                const mintTx = await starCastleContract.mintHarvestOnChain(activeLedgerAddr);
                await mintTx.wait();
                
                leadHarvested = 0;
                mercuryHarvested = 0;
                sulfurHarvested = 0;
                saveHarvestedReagents();
                alert("🔮 Alchemical harvest successfully recorded on-chain and minted to Zarrella Ledger!");
            } catch (err) {
                console.error("On-chain minting failed:", err);
                alert(`Minting failed: ${err.message}`);
            } finally {
                const btn = document.getElementById("btnMint");
                btn.disabled = false;
                btn.innerText = "🔮 Mint Harvest to Ledger";
            }
        }

        // Initialize Web3 configs on startup
        initWeb3();

        // Color Sliders custom update callback
        let shipColor = "#00f2fe";

        function updateColors() {
            const colOuter = document.getElementById("colOuter").value;
            const colMid = document.getElementById("colMid").value;
            const colInner = document.getElementById("colInner").value;
            const colPrimary = document.getElementById("colPrimary").value;

            // Update rings array
            rings[2].color = colOuter;
            rings[1].color = colMid;
            rings[0].color = colInner;

            // Update ship & central core color variable
            shipColor = colPrimary;

            // Update CSS variables for full cabinet/neon integration
            document.documentElement.style.setProperty('--primary', colPrimary);
            
            // Generate glowing translucent rgba fallback
            const r = parseInt(colPrimary.slice(1, 3), 16);
            const g = parseInt(colPrimary.slice(3, 5), 16);
            const b = parseInt(colPrimary.slice(5, 7), 16);
            document.documentElement.style.setProperty('--primary-glow', `rgba(${r}, ${g}, ${b}, 0.6)`);
            document.documentElement.style.setProperty('--ring-outer', colOuter);
            document.documentElement.style.setProperty('--ring-mid', colMid);
            document.documentElement.style.setProperty('--ring-inner', colInner);
        }

        // Game Entities
        let gameActive = false;
        let score = 0;
        let lives = 3;

        const ship = {
            x: size / 2,
            y: size - 80,
            vx: 0,
            vy: 0,
            angle: -Math.PI / 2,
            rotSpeed: 0.08,
            speed: 0.15,
            friction: 0.98,
            radius: 12
        };

        const bullets = [];
        const castleBullets = [];
        const mines = [];
        const laser = { active: false, charge: 0, angle: 0 };
        let mineSpawnTimer = 0;

        // Rings configurations (3 concentric rings with segment gaps)
        const rings = [
            { radius: 60, speed: 0.006, color: "#00e676", segments: [1, 1, 0, 1, 1, 0, 1, 0] },
            { radius: 90, speed: -0.004, color: "#ffaa00", segments: [1, 0, 1, 1, 1, 0, 1, 1] },
            { radius: 120, speed: 0.002, color: "#ff007f", segments: [1, 1, 1, 0, 1, 1, 0, 1] }
        ];
        
        let ringAngle = 0;
        let castleAngle = 0;
        let castleFireTimer = 0;

        // Keys state
        const keys = {};
        window.addEventListener("keydown", e => {
            keys[e.code] = true;
            if (e.code === "Space") e.preventDefault();
        });
        window.addEventListener("keyup", e => {
            keys[e.code] = false;
        });

        function fireLaser() {
            if (bullets.length >= 4) return;
            playLaserSound();
            const bx = ship.x + Math.cos(ship.angle) * ship.radius;
            const by = ship.y + Math.sin(ship.angle) * ship.radius;
            bullets.push({
                x: bx,
                y: by,
                vx: Math.cos(ship.angle) * 5,
                vy: Math.sin(ship.angle) * 5,
                life: 60
            });
        }

        function drawVectorLine(x1, y1, x2, y2, color, glowWidth = 6) {
            ctx.shadowBlur = glowWidth;
            ctx.shadowColor = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            
            // Reset shadow
            ctx.shadowBlur = 0;
        }

        function drawShip() {
            const cos = Math.cos(ship.angle);
            const sin = Math.sin(ship.angle);

            const x0 = ship.x + cos * ship.radius;
            const y0 = ship.y + sin * ship.radius;

            const x1 = ship.x + Math.cos(ship.angle + 2.5) * ship.radius;
            const y1 = ship.y + Math.sin(ship.angle + 2.5) * ship.radius;

            const x2 = ship.x + Math.cos(ship.angle - 2.5) * ship.radius;
            const y2 = ship.y + Math.sin(ship.angle - 2.5) * ship.radius;

            drawVectorLine(x0, y0, x1, y1, shipColor);
            drawVectorLine(x1, y1, ship.x - cos * (ship.radius/3), ship.y - sin * (ship.radius/3), shipColor);
            drawVectorLine(ship.x - cos * (ship.radius/3), ship.y - sin * (ship.radius/3), x2, y2, shipColor);
            drawVectorLine(x2, y2, x0, y0, shipColor);
        }

        function drawCastle() {
            const cx = size / 2;
            const cy = size / 2;
            
            // Draw central target core (shielded castle) using dynamic primary/shipColor
            ctx.lineWidth = 2;
            ctx.strokeStyle = shipColor;
            ctx.shadowColor = shipColor;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(cx, cy, 20, 0, Math.PI * 2);
            ctx.stroke();

            // Core center indicator
            ctx.beginPath();
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fillStyle = shipColor;
            ctx.fill();

            // Reset shadows
            ctx.shadowBlur = 0;

            // Draw shield rings with segments
            rings.forEach((ring, rIdx) => {
                const totalSegments = ring.segments.length;
                const segAngle = (Math.PI * 2) / totalSegments;
                const currentRot = ringAngle * ring.speed * 100;
                
                for (let i = 0; i < totalSegments; i++) {
                    if (ring.segments[i] === 0) continue; // broken segment

                    const startA = i * segAngle + currentRot;
                    const endA = startA + segAngle - 0.15; // Small spacer gap
                    
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = ring.color;
                    ctx.strokeStyle = ring.color;
                    ctx.beginPath();
                    ctx.arc(cx, cy, ring.radius, startA, endA);
                    ctx.stroke();
                }
            });
            ctx.shadowBlur = 0;
        }

        // AI Mode toggle state
        let aiMode = false;

        function toggleAiMode() {
            aiMode = !aiMode;
            const btn = document.getElementById("btnAiToggle");
            if (aiMode) {
                btn.innerText = "AI Mode: On";
                btn.style.borderColor = "#00ff66";
                btn.style.boxShadow = "0 0 10px rgba(0, 255, 102, 0.4)";
                if (!gameActive) startGame();
            } else {
                btn.innerText = "AI Mode: Off";
                btn.style.borderColor = "";
                btn.style.boxShadow = "";
            }
        }

        function runAiLogic() {
            const targetX = size / 2;
            const targetY = size / 2;
            const dist = Math.hypot(ship.x - targetX, ship.y - targetY);
            
            // 1. Orbit Control: Maintain a clean orbital radius of 200px
            const desiredRadius = 200;
            const angleToCenter = Math.atan2(targetY - ship.y, targetX - ship.x);
            
            // Calculate tangent direction (clockwise orbit)
            const tangentAngle = angleToCenter + Math.PI / 2;
            
            // Combine tangential velocity with radial correction velocity
            const radialCorrection = (dist - desiredRadius) * 0.05; // Proportional feedback
            const desiredVx = Math.cos(tangentAngle) * 3 + Math.cos(angleToCenter) * radialCorrection;
            const desiredVy = Math.sin(tangentAngle) * 3 + Math.sin(angleToCenter) * radialCorrection;
            
            // Smoothly adjust ship velocities towards desired values
            ship.vx += (desiredVx - ship.vx) * 0.1;
            ship.vy += (desiredVy - ship.vy) * 0.1;

            // 2. Targeting Core & Aim Control
            const angleToTarget = Math.atan2(targetY - ship.y, targetX - ship.x);
            let angleDiff = angleToTarget - ship.angle;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            
            if (Math.abs(angleDiff) > 0.02) {
                ship.angle += Math.sign(angleDiff) * ship.rotSpeed;
            }

            // 3. Bullet & Homing Mine Evasion System
            castleBullets.forEach(cb => {
                const distToBullet = Math.hypot(cb.x - ship.x, cb.y - ship.y);
                if (distToBullet < 70) {
                    // Thrust away from bullet path radially
                    const angleFromBullet = Math.atan2(ship.y - cb.y, ship.x - cb.x);
                    ship.vx += Math.cos(angleFromBullet) * ship.speed * 0.8;
                    ship.vy += Math.sin(angleFromBullet) * ship.speed * 0.8;
                }
            });
            mines.forEach(m => {
                const distToMine = Math.hypot(m.x - ship.x, m.y - ship.y);
                if (distToMine < 80) {
                    // Thrust away from homing mine radially
                    const angleFromMine = Math.atan2(ship.y - m.y, ship.x - m.x);
                    ship.vx += Math.cos(angleFromMine) * ship.speed * 0.9;
                    ship.vy += Math.sin(angleFromMine) * ship.speed * 0.9;
                }
            });

            // 4. Smart Firing Logic: Fire when reasonably aligned
            if (Math.abs(angleDiff) < 0.15 && Math.random() < 0.25) {
                fireLaser();
            }
        }

        function update() {
            if (!gameActive) return;

            let thrusting = false;

            if (aiMode) {
                runAiLogic();
            } else {
                // Handle Input
                if (keys["KeyA"] || keys["ArrowLeft"]) ship.angle -= ship.rotSpeed;
                if (keys["KeyD"] || keys["ArrowRight"]) ship.angle += ship.rotSpeed;
                if (keys["KeyW"] || keys["ArrowUp"]) {
                    ship.vx += Math.cos(ship.angle) * ship.speed;
                    ship.vy += Math.sin(ship.angle) * ship.speed;
                    thrusting = true;
                }
                if (keys["Space"] || keys["KeyJ"]) {
                    fireLaser();
                    keys["Space"] = false; // Prevents continuous firing on single press
                    keys["KeyJ"] = false;
                }
            }

            // Ship Movement and friction
            ship.vx *= ship.friction;
            ship.vy *= ship.friction;
            ship.x += ship.vx;
            ship.y += ship.vy;

            // Engine Audio Modulator
            if (audioCtx.state !== 'suspended') {
                initEngineSound();
                let isThrusting = thrusting;
                if (aiMode) {
                    // In AI Mode, active movement adjusts output dynamically
                    const currentSpeed = Math.hypot(ship.vx, ship.vy);
                    isThrusting = currentSpeed > 0.5;
                }
                
                if (engineOsc && engineGain) {
                    const targetFreq = isThrusting ? 150 : 60;
                    const targetVol = isThrusting ? 0.12 : 0.02;
                    
                    const currentFreq = engineOsc.frequency.value;
                    const nextFreq = currentFreq + (targetFreq - currentFreq) * 0.08;
                    engineOsc.frequency.setValueAtTime(nextFreq, audioCtx.currentTime);
                    
                    const currentVol = engineGain.gain.value;
                    const nextVol = currentVol + (targetVol - currentVol) * 0.08;
                    engineGain.gain.setValueAtTime(nextVol, audioCtx.currentTime);
                }
            }

            // Screen Wrap
            if (ship.x < 0) ship.x = size;
            if (ship.x > size) ship.x = 0;
            if (ship.y < 0) ship.y = size;
            if (ship.y > size) ship.y = 0;

            // Rotate castle rings
            ringAngle += 0.05;

            // Update Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                b.life--;

                // Collision with shield rings
                let hitRing = false;
                const distToCenter = Math.hypot(b.x - size/2, b.y - size/2);
                
                rings.forEach((ring, rIdx) => {
                    if (Math.abs(distToCenter - ring.radius) < 6) {
                        // Compute which segment was hit
                        let angle = Math.atan2(b.y - size/2, b.x - size/2);
                        if (angle < 0) angle += Math.PI * 2;
                        
                        const currentRot = (ringAngle * ring.speed * 100) % (Math.PI * 2);
                        let relAngle = angle - currentRot;
                        if (relAngle < 0) relAngle += Math.PI * 2;
                        
                        const totalSegments = ring.segments.length;
                        const segIdx = Math.floor((relAngle / (Math.PI * 2)) * totalSegments) % totalSegments;

                        if (ring.segments[segIdx] === 1) {
                            ring.segments[segIdx] = 0; // Destroy segment!
                            hitRing = true;
                            playExplodeSound(300);
                            score += 100;

                            // Harvest reagents based on which ring segment is hit
                            if (rIdx === 2) {
                                leadHarvested += 1;
                            } else if (rIdx === 1) {
                                mercuryHarvested += 1;
                            } else if (rIdx === 0) {
                                sulfurHarvested += 1;
                            }
                            saveHarvestedReagents();
                        }
                    }
                });

                // Collision with homing mines
                let hitMine = false;
                for (let j = mines.length - 1; j >= 0; j--) {
                    const m = mines[j];
                    const distToMine = Math.hypot(b.x - m.x, b.y - m.y);
                    if (distToMine < 14) {
                        hitMine = true;
                        mines.splice(j, 1);
                        playExplodeSound(350);
                        score += 200;
                        // Harvest mercury
                        mercuryHarvested += 1;
                        saveHarvestedReagents();
                        break;
                    }
                }

                // Check core collision
                if (!hitRing && !hitMine && distToCenter < 20) {
                    playExplodeSound(600);
                    score += 5000;
                    leadHarvested += 5;
                    sulfurHarvested += 10;
                    saveHarvestedReagents();
                    resetCastle();
                    hitRing = true;
                }

                if (b.life <= 0 || hitRing || hitMine || b.x < 0 || b.x > size || b.y < 0 || b.y > size) {
                    bullets.splice(i, 1);
                }
            }

            // Spawn homing mines
            mineSpawnTimer++;
            const currentMineSpawnDelay = Math.max(100, 240 - Math.floor(score / 2000) * 20);
            if (mineSpawnTimer > currentMineSpawnDelay) {
                mineSpawnTimer = 0;
                mines.push({
                    x: size / 2,
                    y: size / 2,
                    angle: Math.random() * Math.PI * 2,
                    speed: 1.8 + Math.min(1.5, (score / 15000) * 0.5)
                });
            }

            // Update homing mines
            for (let i = mines.length - 1; i >= 0; i--) {
                const m = mines[i];
                const angle = Math.atan2(ship.y - m.y, ship.x - m.x);
                m.x += Math.cos(angle) * m.speed;
                m.y += Math.sin(angle) * m.speed;
                m.angle += 0.1;

                // Collision with player ship
                const distToShip = Math.hypot(m.x - ship.x, m.y - ship.y);
                if (distToShip < ship.radius + 6) {
                    playExplodeSound(100);
                    lives--;
                    resetShip();
                    mines.splice(i, 1);
                    if (lives <= 0) {
                        gameOver();
                    }
                    continue;
                }
            }

            // Core Laser path checking & execution
            const angleToShip = Math.atan2(ship.y - size/2, ship.x - size/2);
            
            function isPathOpen(angle) {
                let open = true;
                rings.forEach(ring => {
                    const totalSegments = ring.segments.length;
                    const segAngle = (Math.PI * 2) / totalSegments;
                    const currentRot = (ringAngle * ring.speed * 100) % (Math.PI * 2);
                    let relAngle = angle - currentRot;
                    while (relAngle < 0) relAngle += Math.PI * 2;
                    while (relAngle >= Math.PI * 2) relAngle -= Math.PI * 2;
                    const segIdx = Math.floor(relAngle / segAngle) % totalSegments;
                    if (ring.segments[segIdx] === 1) {
                        open = false;
                    }
                });
                return open;
            }

            if (!laser.active) {
                if (isPathOpen(angleToShip)) {
                    laser.charge++;
                    laser.angle = angleToShip;
                    if (laser.charge >= 50) {
                        laser.active = true;
                        laser.charge = 0;
                        playExplodeSound(500); // laser sound
                    }
                } else {
                    if (laser.charge > 0) laser.charge--;
                }
            } else {
                laser.charge++;
                if (laser.charge < 25) {
                    // Laser active: check collision with player ship
                    const shipAngle = Math.atan2(ship.y - size/2, ship.x - size/2);
                    let diff = Math.abs(shipAngle - laser.angle);
                    while (diff > Math.PI) diff = Math.PI * 2 - diff;
                    
                    if (diff < 0.06) {
                        playExplodeSound(100);
                        lives--;
                        resetShip();
                        laser.active = false;
                        laser.charge = 0;
                        if (lives <= 0) {
                            gameOver();
                        }
                    }
                } else {
                    laser.active = false;
                    laser.charge = 0;
                }
            }

            // Central Castle firing logic (escalates based on score)
            castleFireTimer++;
            
            // Dynamic difficulty scaling
            // Score escalates firing frequency: starts at 120 frames, drops by 10 frames per 1000 points down to a minimum of 40 frames
            const currentFireDelay = Math.max(40, 120 - Math.floor(score / 1000) * 10);
            
            if (castleFireTimer > currentFireDelay) {
                castleFireTimer = 0;
                // Fire bullet towards player ship
                const angle = Math.atan2(ship.y - size/2, ship.x - size/2);
                
                // Scale bullet velocity dynamically from 2.5 up to 5.5 depending on score
                const bulletSpeed = Math.min(5.5, 2.5 + (score / 10000) * 0.75);
                
                castleBullets.push({
                    x: size/2,
                    y: size/2,
                    vx: Math.cos(angle) * bulletSpeed,
                    vy: Math.sin(angle) * bulletSpeed,
                    life: 180
                });
            }

            // Update Castle Bullets
            for (let i = castleBullets.length - 1; i >= 0; i--) {
                const cb = castleBullets[i];
                cb.x += cb.vx;
                cb.y += cb.vy;
                cb.life--;

                // Collision with player ship
                const distToShip = Math.hypot(cb.x - ship.x, cb.y - ship.y);
                if (distToShip < ship.radius) {
                    playExplodeSound(100);
                    lives--;
                    resetShip();
                    if (lives <= 0) {
                        gameOver();
                    }
                    castleBullets.splice(i, 1);
                    continue;
                }

                if (cb.life <= 0) {
                    castleBullets.splice(i, 1);
                }
            }
        }

        function resetShip() {
            ship.x = size / 2;
            ship.y = size - 80;
            ship.vx = 0;
            ship.vy = 0;
            ship.angle = -Math.PI / 2;
        }

        function resetCastle() {
            // Re-arm shield rings
            rings.forEach(ring => {
                ring.segments = ring.segments.map(() => 1);
            });
        }

        // Reagent Harvesting state
        let leadHarvested = 0;
        let mercuryHarvested = 0;
        let sulfurHarvested = 0;

        function loadHarvestedReagents() {
            leadHarvested = parseInt(localStorage.getItem("harvested_Lead")) || 0;
            mercuryHarvested = parseInt(localStorage.getItem("harvested_Mercury")) || 0;
            sulfurHarvested = parseInt(localStorage.getItem("harvested_Sulfur")) || 0;
        }

        function saveHarvestedReagents() {
            localStorage.setItem("harvested_Lead", leadHarvested);
            localStorage.setItem("harvested_Mercury", mercuryHarvested);
            localStorage.setItem("harvested_Sulfur", sulfurHarvested);
        }

        function draw() {
            // Space black background
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, size, size);

            // Draw vector background grid lines
            ctx.strokeStyle = "rgba(0, 242, 254, 0.04)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            const gridSpacing = 40;
            for (let x = 0; x < size; x += gridSpacing) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, size);
            }
            for (let y = 0; y < size; y += gridSpacing) {
                ctx.moveTo(0, y);
                ctx.lineTo(size, y);
            }
            ctx.stroke();

            // Draw game elements
            drawCastle();
            drawShip();

            // Draw player bullets (green glow)
            bullets.forEach(b => {
                drawVectorLine(b.x, b.y, b.x - b.vx * 1.5, b.y - b.vy * 1.5, "#00ffaa", 4);
            });

            // Draw enemy castle bullets (pulsing red/orange glow)
            castleBullets.forEach(cb => {
                drawVectorLine(cb.x, cb.y, cb.x - cb.vx * 1.5, cb.y - cb.vy * 1.5, "#ff0055", 6);
            });

            // Draw homing mines
            mines.forEach(m => {
                ctx.strokeStyle = "#ff5500";
                ctx.shadowColor = "#ff5500";
                ctx.shadowBlur = 6;
                ctx.beginPath();
                // Draw rotating diamond
                for (let i = 0; i < 4; i++) {
                    const a = m.angle + (i * Math.PI / 2);
                    const r = (i % 2 === 0) ? 8 : 4;
                    const px = m.x + Math.cos(a) * r;
                    const py = m.y + Math.sin(a) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
            });

            // Draw Laser Warning / Fire
            if (laser.active) {
                const lx = size/2 + Math.cos(laser.angle) * size;
                const ly = size/2 + Math.sin(laser.angle) * size;
                ctx.shadowBlur = 25;
                ctx.shadowColor = "#ff3300";
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.moveTo(size/2, size/2);
                ctx.lineTo(lx, ly);
                ctx.stroke();
                
                ctx.strokeStyle = "#ff3300";
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.shadowBlur = 0;
            } else if (laser.charge > 0) {
                // Warning indicator: pulsating red line
                const lx = size/2 + Math.cos(laser.angle) * size;
                const ly = size/2 + Math.sin(laser.angle) * size;
                const alpha = (Math.sin(Date.now() * 0.05) + 1) / 2;
                ctx.strokeStyle = `rgba(255, 50, 0, ${alpha})`;
                ctx.shadowColor = "#ff3300";
                ctx.shadowBlur = 8;
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(size/2, size/2);
                ctx.lineTo(lx, ly);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.shadowBlur = 0;
            }

            // HUD Score & Lives top text (vector styled)
            ctx.font = "14px Orbitron";
            ctx.fillStyle = shipColor;
            ctx.shadowColor = shipColor;
            ctx.shadowBlur = 4;
            ctx.fillText(`SCORE: ${String(score).padStart(5, '0')}`, 20, 30);
            ctx.fillText(`SHIPS: ${lives}`, size - 100, 30);
            
            // Draw Harvested Reagents Overlay
            ctx.font = "11px Orbitron";
            ctx.fillStyle = "#a2b4c2";
            ctx.fillText(`HARVESTED LEAD (Pb): ${leadHarvested}`, 20, 50);
            ctx.fillText(`HARVESTED MERCURY (Hg): ${mercuryHarvested}`, 20, 65);
            ctx.fillText(`HARVESTED SULFUR (S): ${sulfurHarvested}`, 20, 80);
            
            ctx.shadowBlur = 0;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            initEngineSound();
            score = 0;
            lives = 3;
            gameActive = true;
            resetShip();
            resetCastle();
            bullets.length = 0;
            castleBullets.length = 0;
            mines.length = 0;
            laser.active = false;
            laser.charge = 0;
            mineSpawnTimer = 0;
            loadHarvestedReagents();
            document.getElementById("btnStart").innerText = "Resume Game";
        }

        function resetGame() {
            score = 0;
            lives = 3;
            gameActive = false;
            if (engineGain) {
                engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
            }
            resetShip();
            resetCastle();
            bullets.length = 0;
            castleBullets.length = 0;
            mines.length = 0;
            laser.active = false;
            laser.charge = 0;
            leadHarvested = 0;
            mercuryHarvested = 0;
            sulfurHarvested = 0;
            saveHarvestedReagents();
            document.getElementById("btnStart").innerText = "Start Game";
        }

        function gameOver() {
            gameActive = false;
            if (engineGain) {
                engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
            }
            bullets.length = 0;
            castleBullets.length = 0;
            mines.length = 0;
            laser.active = false;
            laser.charge = 0;
            saveHarvestedReagents();
            alert(`GAME OVER! Final Score: ${score}\nLead Harvested: ${leadHarvested}\nMercury Harvested: ${mercuryHarvested}\nSulfur Harvested: ${sulfurHarvested}`);
            resetGame();
        }

        // Initialize color config initially
        updateColors();

        // Load reagents initially
        loadHarvestedReagents();

        // Start render loop immediately
        loop();
    </script>
</body>
</html>
